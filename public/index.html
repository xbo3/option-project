<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>OPTION — Ranking Slide v2</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2F0ED;--card:rgba(255,255,255,.72);--text:#1A1A1A;--text2:#777;--text3:#B0B0B0;
  --gold:#C47F17;--gold-l:#FEF5E7;--green:#1A8C5E;--green-l:#E8F8F0;
  --blue:#2660D4;--blue-l:#EBF2FE;--purple:#8B5CF6;--cyan:#06B6D4;
  --dur:.5s;--ease:cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Sora',-apple-system,sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;justify-content:center;-webkit-font-smoothing:antialiased;}
.device{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative;overflow:hidden;}
.hdr{display:flex;align-items:center;justify-content:center;padding:6px 16px;z-index:60;background:var(--bg);}
.logo{font-weight:900;font-size:14px;letter-spacing:-.5px;
  background:linear-gradient(135deg,#C47F17,#8B5A0B);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
.main{height:calc(100vh - 30px - 56px);overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;padding-bottom:20px;}
.main::-webkit-scrollbar{display:none;}

/* Poll */
.poll{margin:6px 10px 6px;border-radius:14px;background:var(--card);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.6);padding:8px 12px;box-shadow:0 4px 16px rgba(0,0,0,.03);
  position:relative;overflow:hidden;}
.poll::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),var(--blue),var(--gold));background-size:200% 100%;animation:sh 3s ease infinite;}
@keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
.poll-row{display:flex;align-items:center;justify-content:space-between;}
.poll-tag{font-size:8px;font-weight:700;color:var(--gold);letter-spacing:1px;}
.poll-live{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:100px;
  background:var(--green-l);color:var(--green);font-size:8px;font-weight:700;}
.poll-live::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--green);animation:pd 1.5s ease infinite;}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.3}}
.poll-q{font-size:12px;font-weight:700;line-height:1.4;margin:4px 0;}
.poll-opts{display:flex;gap:5px;}
.p-opt{flex:1;padding:6px;border-radius:8px;background:rgba(0,0,0,.03);position:relative;overflow:hidden;text-align:center;}
.p-bar{position:absolute;left:0;top:0;bottom:0;border-radius:8px;}
.p-bar.a{background:rgba(38,96,212,.05);width:31%;}
.p-bar.b{background:rgba(196,127,23,.07);width:69%;}
.p-text{font-size:8px;font-weight:600;position:relative;z-index:1;}
.p-pct{font-size:11px;font-weight:800;position:relative;z-index:1;color:var(--text3);}
.p-pct.w{color:var(--gold);}

.sort-bar{display:flex;gap:4px;padding:4px 10px;overflow-x:auto;scrollbar-width:none;}
.sort-bar::-webkit-scrollbar{display:none;}
.sort-btn{flex-shrink:0;padding:5px 10px;border-radius:100px;font-size:10px;font-weight:600;
  color:var(--text3);background:rgba(255,255,255,.5);border:1px solid rgba(0,0,0,.04);white-space:nowrap;}
.sort-btn.on{color:#fff;background:#1A1A1A;border-color:#1A1A1A;}

.sec-t{font-size:13px;font-weight:800;letter-spacing:-.5px;padding:4px 12px 6px;}
.sec-t span{font-size:10px;font-weight:500;color:var(--text3);}

/* ========== RANKING AREA ========== */
.rank-area{
  position:relative;padding:0 10px;
  overflow:hidden;
}

/* All rank items are absolutely positioned and animated via transform */
.rank-area .slot{
  transition:transform var(--dur) var(--ease),opacity var(--dur) var(--ease);
  will-change:transform,opacity;
  position:absolute;
  backface-visibility:hidden;
}

/* ===== HERO ROW (slot 0 = mobile, slot 1 = info) ===== */
.slot-mobile{
  width:calc(33.33% - 4px);height:190px;
  border-radius:14px;overflow:hidden;
  background:#1a1a2e;
  box-shadow:0 4px 16px rgba(0,0,0,.12);
  left:0;top:0;
}
.slot-info{
  width:calc(66.66% - 2px);height:190px;
  border-radius:14px;overflow:hidden;
  background:linear-gradient(145deg,#FFFDF8,#FFF8ED,#FFF4E0);
  border:1.5px solid rgba(196,127,23,.15);
  box-shadow:0 6px 24px rgba(196,127,23,.06);
  left:calc(33.33% + 1px);top:0;
}

/* ===== SUB ROW (slots 2,3,4) ===== */
.slot-sub{
  width:calc(33.33% - 4px);height:120px;
  border-radius:12px;
  background:var(--card);backdrop-filter:blur(20px);
  border:1px solid rgba(0,0,0,.04);
  box-shadow:0 2px 8px rgba(0,0,0,.03);
}
.slot-sub-0{left:0;top:198px;}
.slot-sub-1{left:calc(33.33% + 1px);top:198px;}
.slot-sub-2{left:calc(66.66% + 2px);top:198px;}

/* ===== BOT ROW (slots 5,6,7,8) ===== */
.slot-bot{
  width:calc(25% - 4px);height:80px;
  border-radius:10px;
  background:var(--card);border:1px solid rgba(0,0,0,.03);
  opacity:.65;
}
.slot-bot-0{left:0;top:326px;}
.slot-bot-1{left:calc(25% + 0px);top:326px;}
.slot-bot-2{left:calc(50% + 0px);top:326px;}
.slot-bot-3{left:calc(75% + 0px);top:326px;}

/* ========== CONTENT STYLES ========== */

/* Mobile preview */
.mob-inner{height:100%;padding:6px;color:#fff;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.mob-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.mob-logo{font-size:6px;font-weight:800;opacity:.5;}
.mob-banner{border-radius:8px;padding:6px;margin-bottom:4px;
  background:linear-gradient(135deg,rgba(196,127,23,.2),rgba(139,92,246,.15));position:relative;overflow:hidden;}
.mob-btag{font-size:5px;font-weight:700;color:#FFD700;letter-spacing:.5px;}
.mob-btitle{font-size:8px;font-weight:800;margin-top:1px;line-height:1.2;}
.mob-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin-top:auto;}
.mob-gi{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.mob-label{font-size:5px;opacity:.5;text-align:center;padding:2px;}

/* Info panel */
.info-inner{padding:10px;height:100%;display:flex;flex-direction:column;position:relative;}
.info-glow{position:absolute;top:-30px;right:-30px;width:80px;height:80px;
  background:radial-gradient(circle,rgba(196,127,23,.08),transparent 70%);}
.info-dia{position:absolute;right:6px;top:4px;font-size:52px;font-weight:900;line-height:.85;
  background:linear-gradient(180deg,#FFD54F,#C47F17,#8B6914);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 3px rgba(196,127,23,.2));opacity:.25;}
.info-tier{font-size:7px;font-weight:700;color:var(--gold);padding:2px 6px;border-radius:4px;
  background:rgba(196,127,23,.08);display:inline-block;width:fit-content;position:relative;z-index:2;}
.info-name{font-size:20px;font-weight:900;letter-spacing:-1px;line-height:1.1;margin-top:auto;position:relative;z-index:2;}
.info-stats{display:flex;gap:6px;margin-top:5px;position:relative;z-index:2;}
.info-st{text-align:center;}
.info-st .l{font-size:7px;color:var(--text3);}
.info-st .v{font-size:15px;font-weight:900;letter-spacing:-.5px;}
.info-st .v.gd{color:var(--gold);}
.info-bot{display:flex;align-items:center;gap:4px;margin-top:5px;position:relative;z-index:2;}
.info-stars{font-size:8px;letter-spacing:1px;filter:saturate(1.5);}
.info-score{font-size:12px;font-weight:900;color:var(--gold);}
.info-meta{font-size:6px;color:var(--text3);margin-left:auto;}

/* Sub card */
.sub-inner{padding:7px 5px;height:100%;display:flex;flex-direction:column;align-items:center;text-align:center;}
.sub-tag{font-size:6px;font-weight:700;padding:2px 5px;border-radius:4px;display:inline-block;margin-bottom:2px;}
.sub-tag.blue{background:var(--blue-l);color:var(--blue);}
.sub-tag.purple{background:rgba(139,92,246,.08);color:var(--purple);}
.sub-tag.gold{background:var(--gold-l);color:var(--gold);}
.sub-tag.cyan{background:rgba(6,182,212,.08);color:var(--cyan);}
.sub-tag.orange{background:rgba(245,158,11,.08);color:#E97316;}
.sub-nm{font-size:12px;font-weight:900;letter-spacing:-.3px;margin:1px 0;}
.sub-kr{font-size:7px;color:var(--text2);margin-bottom:2px;}
.sub-sts{display:flex;gap:6px;margin-top:auto;}
.sub-sts .l{font-size:5px;color:var(--text3);}
.sub-sts .v{font-size:11px;font-weight:800;}

/* Bot card */
.bot-inner{padding:5px 3px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.bot-nm{font-size:9px;font-weight:800;letter-spacing:-.2px;}
.bot-kr{font-size:6px;color:var(--text3);}
.bot-v{font-size:10px;font-weight:800;margin-top:2px;}

/* pkg colors */
.c-gold{color:var(--gold);}.c-blue{color:var(--blue);}.c-purple{color:var(--purple);}.c-cyan{color:var(--cyan);}.c-orange{color:#E97316;}

/* ===== TRANSITION STATES ===== */
/* exit: mobile goes UP */
.slot-mobile.anim-exit{transform:translate3d(0,-110%,0) !important;opacity:0 !important;}
/* exit: info goes RIGHT */
.slot-info.anim-exit{transform:translate3d(110%,0,0) !important;opacity:0 !important;}
/* sub[0] rises up+left to mobile pos */
.slot-sub.anim-rise-mob{
  transform:translate3d(0,-198px,0) !important;
  height:190px !important;
  opacity:0.6 !important;
}
/* sub[1] rises up+grows to info pos */
.slot-sub.anim-rise-info{
  transform:translate3d(0,-198px,0) scale(1.02) !important;
  opacity:0.6 !important;
}
/* sub[2] shifts left */
.slot-sub.anim-shift-l{transform:translate3d(calc(-33.33% - 1px),0,0) !important;}
/* bot rises to sub row */
.slot-bot.anim-rise{transform:translate3d(0,-128px,0) !important;opacity:.8 !important;}
/* bot shifts left */
.slot-bot.anim-shift-l{transform:translate3d(-25%,0,0) !important;}
/* enter from right */
.slot-bot.anim-enter{transform:translate3d(120%,0,0) !important;opacity:0 !important;transition:none !important;}

/* ===== NO TRANSITION (for reset) ===== */
.no-trans{transition:none !important;}

/* ===== SWIPE HINT ===== */
.swipe-hint{text-align:center;font-size:9px;color:var(--text3);padding:6px 0;opacity:.5;
  animation:hp 2.5s ease infinite;}
@keyframes hp{0%,100%{opacity:.3}50%{opacity:.7}}

/* ===== LIST ===== */
.list-section{padding:0 10px;margin-top:6px;}
.rn{border-radius:12px;padding:10px;background:var(--card);backdrop-filter:blur(20px);
  border:1px solid rgba(0,0,0,.04);display:flex;align-items:center;gap:8px;
  margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.02);}
.rn-logo{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:5px;font-weight:800;color:#fff;flex-shrink:0;text-align:center;line-height:1.1;}
.rn-i{flex:1;}
.rn-nm{font-size:11px;font-weight:700;}
.rn-m{display:flex;align-items:center;gap:3px;margin-top:1px;}
.rn-st{font-size:7px;letter-spacing:1px;}
.rn-sc{font-size:9px;font-weight:700;color:var(--text3);}
.rn-r{text-align:right;flex-shrink:0;}
.rn-p{font-size:14px;font-weight:800;}
.rn-c{font-size:7px;color:var(--text3);}

.live-t{font-size:11px;font-weight:800;padding:6px 10px 3px;}
.live-item{border-radius:12px;padding:10px;background:var(--card);border:1px solid rgba(0,0,0,.04);
  display:flex;align-items:center;gap:8px;margin:0 10px 6px;}
.live-badge{background:#DC2626;color:#fff;font-size:6px;font-weight:800;padding:1px 4px;border-radius:3px;margin-right:2px;}

/* Bottom nav */
.bot-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;height:56px;
  display:flex;align-items:center;justify-content:space-around;
  background:rgba(242,240,237,.95);backdrop-filter:blur(20px);
  border-top:1px solid rgba(0,0,0,.06);z-index:100;}
.nav-item{font-size:18px;opacity:.3;padding:8px;}
.nav-item.on{opacity:1;}
</style>
</head>
<body>
<div class="device">
<div class="hdr"><div class="logo">OPTION</div></div>
<div class="main" id="mainArea">

<div class="poll">
  <div class="poll-row"><div class="poll-tag">100명에게 물어봐</div><div class="poll-live">73/100</div></div>
  <div class="poll-q">친구가 슬롯 잘하면 여자도 꼬실 수 있다는데? 🤔</div>
  <div class="poll-opts">
    <div class="p-opt"><div class="p-bar a"></div><div class="p-text">친구 말이 맞다</div><div class="p-pct">31%</div></div>
    <div class="p-opt"><div class="p-bar b"></div><div class="p-text">사람색기 아니네</div><div class="p-pct w">69%</div></div>
  </div>
</div>

<div class="sort-bar">
  <div class="sort-btn on">첫충 높은순</div><div class="sort-btn">매충 높은순</div>
  <div class="sort-btn">캐시백 높은순</div><div class="sort-btn">올인 높은순</div>
  <div class="sort-btn">가입 높은순</div><div class="sort-btn">이벤트</div>
</div>

<div class="sec-t">최고 조건 추천 <span id="cnt"></span></div>

<!-- ========== RANKING AREA (fixed height) ========== -->
<div class="rank-area" id="rankArea" style="height:416px;">
  <!-- slot 0: mobile preview -->
  <div class="slot slot-mobile" id="s0"></div>
  <!-- slot 1: info banner -->
  <div class="slot slot-info" id="s1"></div>
  <!-- slot 2,3,4: sub cards -->
  <div class="slot slot-sub slot-sub-0" id="s2"></div>
  <div class="slot slot-sub slot-sub-1" id="s3"></div>
  <div class="slot slot-sub slot-sub-2" id="s4"></div>
  <!-- slot 5,6,7,8: bot cards -->
  <div class="slot slot-bot slot-bot-0" id="s5"></div>
  <div class="slot slot-bot slot-bot-1" id="s6"></div>
  <div class="slot slot-bot slot-bot-2" id="s7"></div>
  <div class="slot slot-bot slot-bot-3" id="s8"></div>
</div>

<div class="swipe-hint">← 스와이프하여 랭킹 순환 →</div>

<div class="list-section" id="listSec"></div>
<div class="live-t">라이브 조건 피드</div>
<div id="liveFeed"></div>

</div>
<div class="bot-nav">
  <div class="nav-item">☰</div><div class="nav-item on">📊</div>
  <div class="nav-item">✏️</div><div class="nav-item">◇</div><div class="nav-item">👤</div>
</div>
</div>

<script>
var D=[];
var N=0,ci=0,busy=false;
var defaultIcons=['🎰','🃏','⚽','🎲','🎯','🏆'];

function loadFromAPI(){
  fetch('/api/sites').then(function(r){return r.json();}).then(function(data){
    D=data.map(function(s){
      var name=s.name||'';
      var words=name.split('');
      var half=Math.ceil(words.length/2);
      var enName=name.length>4?(name.substring(0,half)+'\n'+name.substring(half)):name;
      return {
        n:name,en:enName,ef:name,
        f:s.firstBonus||0,r:s.reloadBonus||0,c:s.cashback||0,
        rt:s.rating||0,rv:s.reviews||0,u:0,
        p:'gold',tag:s.description||getCatTag(s.category),
        ic:defaultIcons,img:s.image||''
      };
    });
    N=D.length;
    if(N>0){fill();startAuto();}
    else{document.getElementById('rankArea').innerHTML='<div style="text-align:center;padding:60px 0;color:var(--text3)">등록된 업체가 없습니다<br><a href="/admin.html" style="color:var(--gold)">관리자에서 등록</a></div>';}
  }).catch(function(e){console.log('API error:',e);});
}

function getCatTag(cat){
  var m={casino:'Casino Pick',slot:'Slot Master',sports:'Sports Pick',etc:'Special'};
  return m[cat]||'Pick';
}

function startAuto(){
  var at=setInterval(function(){if(!document.hidden&&N>1)cycleNext();},5000);
  document.addEventListener('touchstart',function(){clearInterval(at);},{once:true});
}
var bgs=['linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)','linear-gradient(135deg,#0f172a,#1e3a5f,#1a1a2e)',
  'linear-gradient(135deg,#2d1b4e,#1a1a2e,#0f3460)','linear-gradient(135deg,#1a2e1a,#162e3e,#0f3460)',
  'linear-gradient(135deg,#2e1a1a,#3e1616,#460f2f)'];
var gColors=['#FFD700 #C47F17','#DC2626 #991B1B','#2660D4 #1E40AF','#1A8C5E #166534','#8B5CF6 #6D28D9','#E97316 #C2410C'];

function S(off){return D[(ci+off)%N];}
function cc(p){return p?'c-'+p:'';}

function mobHTML(s,i){
  var bg=bgs[i%bgs.length];
  if(s.img){
    return '<div class="mob-inner" style="background:url('+s.img+') center/cover no-repeat"><div style="margin-top:auto;background:rgba(0,0,0,.5);border-radius:8px;padding:6px;text-align:center"><div style="font-size:10px;font-weight:800">'+s.n+'</div><div style="font-size:7px;opacity:.6">'+s.tag+'</div></div></div>';
  }
  var h='<div class="mob-inner" style="background:'+bg+'">';
  h+='<div class="mob-hdr"><div class="mob-logo">'+s.ef+'</div></div>';
  h+='<div class="mob-banner"><div class="mob-btag">⚡ '+s.tag+'</div>';
  h+='<div class="mob-btitle">'+s.n+' 특별 이벤트</div></div>';
  h+='<div class="mob-grid">';
  s.ic.forEach(function(ic,j){
    var gc=gColors[j%gColors.length].split(' ');
    h+='<div class="mob-gi" style="background:linear-gradient(135deg,'+gc[0]+','+gc[1]+')">'+ic+'</div>';
  });
  h+='</div><div class="mob-label">'+s.n+' · 라이브</div></div>';
  return h;
}

function infoHTML(s){
  var h='<div class="info-inner"><div class="info-glow"></div>';
  h+='<div class="info-dia">1</div>';
  h+='<div class="info-tier">◆ '+s.tag+'</div>';
  h+='<div class="info-name '+cc(s.p)+'">'+s.en.replace('\n','<br>')+'</div>';
  h+='<div class="info-stats">';
  h+='<div class="info-st"><div class="l">캐시백</div><div class="v gd">'+s.c+'%</div></div>';
  h+='<div class="info-st"><div class="l">첫충</div><div class="v gd">'+s.f+'%</div></div>';
  h+='</div>';
  h+='<div class="info-bot"><span class="info-stars">⭐⭐⭐⭐⭐</span>';
  h+='<span class="info-score">'+s.rt+'</span>';
  h+='<span class="info-meta">'+s.rv+'건·'+s.u+'명</span></div></div>';
  return h;
}

function subHTML(s){
  var tc=s.p||'gold';
  var h='<div class="sub-inner">';
  h+='<div class="sub-tag '+tc+'">'+s.tag+'</div>';
  h+='<div class="sub-nm '+cc(s.p)+'">'+s.ef+'</div>';
  h+='<div class="sub-kr">'+s.n+' ⭐'+s.rt+'</div>';
  h+='<div class="sub-sts">';
  h+='<div><div class="l">첫충</div><div class="v">'+s.f+'%</div></div>';
  h+='<div><div class="l">매충</div><div class="v">'+s.r+'%</div></div>';
  h+='<div><div class="l">캐시백</div><div class="v">'+s.c+'%</div></div>';
  h+='</div></div>';
  return h;
}

function botHTML(s){
  var h='<div class="bot-inner">';
  h+='<div class="bot-nm '+cc(s.p)+'">'+s.ef+'</div>';
  h+='<div class="bot-kr">'+s.n+'</div>';
  h+='<div class="bot-v">'+s.f+'%</div></div>';
  return h;
}

function fill(){
  var el=function(id){return document.getElementById(id);};
  el('s0').innerHTML=mobHTML(S(0),ci);
  el('s0').style.background=bgs[ci%bgs.length];
  el('s1').innerHTML=infoHTML(S(0));
  el('s2').innerHTML=subHTML(S(1));
  el('s3').innerHTML=subHTML(S(2));
  el('s4').innerHTML=subHTML(S(3));
  el('s5').innerHTML=botHTML(S(4));
  el('s6').innerHTML=botHTML(S(5));
  el('s7').innerHTML=botHTML(S(6));
  el('s8').innerHTML=botHTML(S(7));

  document.getElementById('cnt').textContent=N+'개';

  // List
  var lh='';
  for(var i=8;i<Math.min(10,N);i++){
    var s=S(i);
    var bg2=s.p==='purple'?'#8B5CF6':s.p==='gold'?'#C47F17':s.p==='blue'?'#2660D4':'#777';
    lh+='<div class="rn"><div class="rn-logo" style="background:'+bg2+'">'+s.ef.substring(0,4)+'</div>';
    lh+='<div class="rn-i"><div class="rn-nm">'+s.n+'</div>';
    lh+='<div class="rn-m"><span class="rn-st">⭐⭐⭐⭐⭐</span><span class="rn-sc">'+s.rt+'</span></div></div>';
    lh+='<div class="rn-r"><div class="rn-p">'+s.f+'%</div><div class="rn-c">회원 '+s.u+'명</div></div></div>';
  }
  document.getElementById('listSec').innerHTML=lh;

  var fh='';
  for(var i=0;i<2;i++){
    var s=S(i+1);var bg3=s.p==='purple'?'#8B5CF6':s.p==='blue'?'#2660D4':'#C47F17';
    fh+='<div class="live-item"><div class="rn-logo" style="background:'+bg3+';width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:5px;font-weight:800;color:#fff;flex-shrink:0">'+s.ef.substring(0,4)+'</div>';
    fh+='<div style="flex:1"><div style="font-size:11px;font-weight:700">'+s.n+'</div>';
    fh+='<div style="font-size:8px;color:var(--text3);display:flex;align-items:center;gap:3px;margin-top:1px"><span class="live-badge">LIVE</span>특별 보너스 이벤트</div></div>';
    fh+='<div class="rn-r"><div class="rn-p">'+s.f+'%</div><div class="rn-c">회원 '+s.u+'명</div></div></div>';
  }
  document.getElementById('liveFeed').innerHTML=fh;
}

function resetTransforms(){
  for(var i=0;i<=8;i++){
    var el=document.getElementById('s'+i);
    el.classList.add('no-trans');
    el.style.transform='';el.style.opacity='';el.style.height='';
    el.className=el.className.replace(/\banim-\S+/g,'').replace(/\bno-trans\b/g,'').trim();
  }
}

function cycleNext(){
  if(busy)return;busy=true;
  var els=[];for(var i=0;i<=8;i++)els[i]=document.getElementById('s'+i);

  // Re-enable transitions
  els.forEach(function(e){e.classList.remove('no-trans');});

  // ZIGZAG SIMULTANEOUS ANIMATION:
  // s0 (mobile): ↑ exit up
  els[0].style.transform='translate3d(0,-110%,0)';
  els[0].style.opacity='0';

  // s1 (info): → exit right
  els[1].style.transform='translate3d(110%,0,0)';
  els[1].style.opacity='0';

  // s2 (sub0): ↑ rise to hero area
  els[2].style.transform='translate3d(0,-198px,0)';
  els[2].style.opacity='0.5';

  // s3 (sub1): ← shift left to sub0
  els[3].style.transform='translate3d(calc(-33.33% - 5px),0,0)';

  // s4 (sub2): ← shift left to sub1
  els[4].style.transform='translate3d(calc(-33.33% - 5px),0,0)';

  // s5 (bot0): ↑ rise to sub row
  els[5].style.transform='translate3d(0,-128px,0)';
  els[5].style.opacity='.85';

  // s6 (bot1): ← shift left to bot0
  els[6].style.transform='translate3d(-25%,0,0)';

  // s7 (bot2): ← shift left to bot1
  els[7].style.transform='translate3d(-25%,0,0)';

  // s8 (bot3): ← shift left to bot2
  els[8].style.transform='translate3d(-25%,0,0)';

  setTimeout(function(){
    ci=(ci+1)%N;
    resetTransforms();
    // Use rAF to ensure no-trans is applied before fill
    requestAnimationFrame(function(){
      fill();
      requestAnimationFrame(function(){
        // Remove no-trans to re-enable for next cycle
        for(var i=0;i<=8;i++){
          document.getElementById('s'+i).classList.remove('no-trans');
        }
        busy=false;
      });
    });
  },520);
}

function cyclePrev(){
  if(busy)return;busy=true;
  var els=[];for(var i=0;i<=8;i++)els[i]=document.getElementById('s'+i);
  els.forEach(function(e){e.classList.remove('no-trans');});

  // Reverse: mobile goes DOWN, info goes LEFT
  els[0].style.transform='translate3d(0,110%,0)';els[0].style.opacity='0';
  els[1].style.transform='translate3d(-110%,0,0)';els[1].style.opacity='0';
  // Subs shift right
  els[2].style.transform='translate3d(calc(33.33% + 5px),0,0)';
  els[3].style.transform='translate3d(calc(33.33% + 5px),0,0)';
  els[4].style.transform='translate3d(calc(33.33% + 5px),128px,0)';els[4].style.opacity='.5';
  // Bots shift right
  els[5].style.transform='translate3d(25%,0,0)';
  els[6].style.transform='translate3d(25%,0,0)';
  els[7].style.transform='translate3d(25%,0,0)';
  els[8].style.transform='translate3d(25%,80px,0)';els[8].style.opacity='0';

  setTimeout(function(){
    ci=(ci-1+N)%N;
    resetTransforms();
    requestAnimationFrame(function(){
      fill();
      requestAnimationFrame(function(){
        for(var i=0;i<=8;i++)document.getElementById('s'+i).classList.remove('no-trans');
        busy=false;
      });
    });
  },520);
}

// Swipe
(function(){
  var a=document.getElementById('mainArea'),sx=0,sy=0,st=0;
  a.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();},{passive:true});
  a.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy,dt=Date.now()-st;
    if(Math.abs(dx)>45&&Math.abs(dx)>Math.abs(dy)*1.2&&dt<500){
      if(dx<0)cycleNext();else cyclePrev();
    }
  },{passive:true});
  var md=false;
  a.addEventListener('mousedown',function(e){md=true;sx=e.clientX;st=Date.now();});
  a.addEventListener('mouseup',function(e){if(!md)return;md=false;var dx=e.clientX-sx;
    if(Math.abs(dx)>45&&Date.now()-st<500){if(dx<0)cycleNext();else cyclePrev();}});
  document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft')cyclePrev();if(e.key==='ArrowRight')cycleNext();});
})();

loadFromAPI();
</script>
