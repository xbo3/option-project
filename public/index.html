<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>OPTION</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2F0ED;--card:rgba(255,255,255,.72);--text:#1A1A1A;--text2:#777;--text3:#B0B0B0;
  --gold:#C47F17;--gold-l:#FEF5E7;--green:#1A8C5E;--green-l:#E8F8F0;
  --blue:#2660D4;--blue-l:#EBF2FE;--purple:#8B5CF6;--cyan:#06B6D4;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Sora',-apple-system,sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;justify-content:center;-webkit-font-smoothing:antialiased;}
.device{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative;overflow:hidden;}
.hdr{display:flex;align-items:center;justify-content:center;padding:6px 16px;z-index:60;background:var(--bg);}
.logo{font-weight:900;font-size:14px;letter-spacing:-.5px;
  background:linear-gradient(135deg,#C47F17,#8B5A0B);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
.main{height:calc(100vh - 30px - 60px);overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;padding-bottom:20px;}
.main::-webkit-scrollbar{display:none;}

/* ===== POLL (1.3x wider) ===== */
.poll{margin:4px -8px 4px -8px;border-radius:14px;background:var(--card);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.6);padding:10px 14px;box-shadow:0 4px 16px rgba(0,0,0,.03);
  position:relative;overflow:hidden;z-index:5;}
.poll::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),var(--blue),var(--gold));background-size:200% 100%;animation:sh 3s ease infinite;}
@keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
.poll-row{display:flex;align-items:center;justify-content:space-between;}
.poll-tag{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:1px;}
.poll-live{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:100px;
  background:var(--green-l);color:var(--green);font-size:8px;font-weight:700;}
.poll-live::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--green);animation:pd 1.5s ease infinite;}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.3}}
.poll-q{font-size:13px;font-weight:700;line-height:1.4;margin:5px 0;}
.poll-opts{display:flex;gap:5px;}
.p-opt{flex:1;padding:7px;border-radius:8px;background:rgba(0,0,0,.03);position:relative;overflow:hidden;text-align:center;}
.p-bar{position:absolute;left:0;top:0;bottom:0;border-radius:8px;}
.p-bar.a{background:rgba(38,96,212,.05);width:31%;}.p-bar.b{background:rgba(196,127,23,.07);width:69%;}
.p-text{font-size:9px;font-weight:600;position:relative;z-index:1;}
.p-pct{font-size:12px;font-weight:800;position:relative;z-index:1;color:var(--text3);}.p-pct.w{color:var(--gold);}

/* ===== SEARCH FILTER ===== */
.filter-bar{display:flex;gap:4px;padding:6px 4px;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.f-btn{flex-shrink:0;padding:5px 10px;border-radius:100px;font-size:10px;font-weight:600;
  color:var(--text3);background:rgba(255,255,255,.5);border:1px solid rgba(0,0,0,.04);
  white-space:nowrap;cursor:pointer;transition:all .15s;}
.f-btn.on{color:#fff;background:var(--gold);border-color:var(--gold);}

.sec-t{font-size:13px;font-weight:800;letter-spacing:-.5px;padding:2px 6px 0;}
.sec-t span{font-size:10px;font-weight:500;color:var(--text3);}

.row-hero{display:flex;gap:3px;padding:0 4px;margin-bottom:4px;}
.row-sub{display:flex;gap:3px;padding:0 4px;margin-bottom:4px;}
.row-bot{display:flex;gap:3px;padding:0 4px;margin-bottom:4px;}

/* ===== DRUM ===== */
.drum{overflow:hidden;position:relative;perspective:800px;}
.drum .rotor{width:100%;height:100%;position:relative;transform-style:preserve-3d;}
.drum .face{position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;overflow:hidden;}

/* Hero shrunk height (poll got wider) */
.d-mob{width:calc(33.33% - 2px);flex-shrink:0;height:180px;border-radius:12px;background:#1a1a2e;box-shadow:0 4px 16px rgba(0,0,0,.12);}
.d-inf{flex:1;height:180px;border-radius:12px;background:linear-gradient(145deg,#FFFDF8,#FFF8ED,#FFF4E0);
  border:1.5px solid rgba(196,127,23,.15);box-shadow:0 6px 24px rgba(196,127,23,.06);}
.d-sub{flex:1;min-width:0;height:155px;border-radius:10px;background:var(--card);
  border:1px solid rgba(0,0,0,.04);box-shadow:0 2px 8px rgba(0,0,0,.03);}
.d-bot{flex:1;min-width:0;height:110px;border-radius:10px;background:var(--card);border:1px solid rgba(0,0,0,.03);}

/* ===== CARD CONTENT ===== */
/* 1위 모바일 이미지 카드 */
.mob-in{height:100%;position:relative;overflow:hidden;border-radius:12px;}
.mob-in img{width:100%;height:100%;object-fit:cover;}
.mob-ov{position:absolute;bottom:0;left:0;right:0;padding:6px 8px;
  background:linear-gradient(transparent,rgba(0,0,0,.75));color:#fff;}
.mob-ov .mob-nm{font-size:10px;font-weight:800;}
.mob-ov .mob-tag{font-size:6px;color:#FFD700;font-weight:700;}

/* 1위 다이아 마크 */
.first-mark{position:absolute;top:4px;left:4px;width:28px;height:28px;z-index:3;
  animation:sparkle 2s ease-in-out infinite;}
.first-mark img{width:100%;height:100%;filter:drop-shadow(0 0 6px rgba(255,215,0,.6));}
@keyframes sparkle{0%,100%{transform:scale(1);filter:brightness(1);}50%{transform:scale(1.15);filter:brightness(1.4);}}

/* 1위 정보 카드 (설명란 정렬 수정) */
.inf-in{padding:10px;height:100%;display:flex;flex-direction:column;position:relative;
  background:linear-gradient(145deg,#FFFDF8,#FFF8ED,#FFF4E0);border-radius:12px;}
.inf-glow{position:absolute;top:-30px;right:-30px;width:80px;height:80px;
  background:radial-gradient(circle,rgba(196,127,23,.08),transparent 70%);}
.inf-tier{font-size:7px;font-weight:700;color:var(--gold);padding:2px 6px;border-radius:4px;
  background:rgba(196,127,23,.08);display:inline-block;width:fit-content;position:relative;z-index:2;}
.inf-name{font-size:16px;font-weight:900;letter-spacing:-1px;line-height:1.15;margin-top:6px;position:relative;z-index:2;}
.inf-val{font-size:22px;font-weight:900;color:var(--gold);margin-top:auto;position:relative;z-index:2;}
.inf-val-label{font-size:8px;color:var(--text3);position:relative;z-index:2;}
.inf-bot{display:flex;align-items:center;gap:4px;margin-top:4px;position:relative;z-index:2;}
.inf-stars{font-size:7px;letter-spacing:1px;filter:saturate(1.5);}
.inf-score{font-size:11px;font-weight:900;color:var(--gold);}
.inf-meta{font-size:6px;color:var(--text3);margin-left:auto;}

/* 2~4위 서브 카드 (이미지) */
.sub-in{height:100%;display:flex;flex-direction:column;overflow:hidden;background:var(--card);border-radius:10px;}
.sub-img{height:70px;position:relative;overflow:hidden;}
.sub-img img{width:100%;height:100%;object-fit:cover;}
.sub-img .sov{position:absolute;bottom:0;left:0;right:0;padding:2px 5px;
  background:linear-gradient(transparent,rgba(0,0,0,.7));display:flex;justify-content:center;}
.sub-img .sov span{font-size:7px;font-weight:700;color:#fff;}
.sub-body{padding:4px;display:flex;flex-direction:column;align-items:center;text-align:center;flex:1;}
.sub-tag{font-size:6px;font-weight:700;padding:2px 5px;border-radius:4px;display:inline-block;margin-bottom:1px;}
.sub-tag.blue{background:var(--blue-l);color:var(--blue);}
.sub-tag.purple{background:rgba(139,92,246,.08);color:var(--purple);}
.sub-tag.gold{background:var(--gold-l);color:var(--gold);}
.sub-tag.cyan{background:rgba(6,182,212,.08);color:var(--cyan);}
.sub-tag.orange{background:rgba(245,158,11,.08);color:#E97316;}
.sub-nm{font-size:11px;font-weight:900;letter-spacing:-.3px;}
.sub-kr{font-size:7px;color:var(--text2);margin-bottom:1px;}
.sub-val{font-size:13px;font-weight:800;color:var(--gold);margin-top:auto;}

/* 5~8위 바텀 카드 (이미지) */
.bot-in{height:100%;display:flex;flex-direction:column;overflow:hidden;background:var(--card);border-radius:10px;}
.bot-img{height:55px;position:relative;overflow:hidden;}
.bot-img img{width:100%;height:100%;object-fit:cover;}
.bot-body{padding:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;flex:1;}
.bot-nm{font-size:9px;font-weight:800;}.bot-kr{font-size:6px;color:var(--text3);}.bot-v{font-size:10px;font-weight:800;margin-top:1px;color:var(--gold);}
.c-gold{color:var(--gold);}.c-blue{color:var(--blue);}.c-purple{color:var(--purple);}.c-cyan{color:var(--cyan);}.c-orange{color:#E97316;}

/* 9~10위 리스트 */
.list-sec{padding:0 4px;margin-top:4px;}
.rn{border-radius:12px;padding:10px;background:var(--card);border:1px solid rgba(0,0,0,.04);
  display:flex;align-items:center;gap:8px;margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.02);}
.rn-logo{width:32px;height:32px;border-radius:8px;overflow:hidden;flex-shrink:0;}
.rn-logo img{width:100%;height:100%;object-fit:cover;}
.rn-i{flex:1;}.rn-nm{font-size:11px;font-weight:700;}
.rn-m{display:flex;align-items:center;gap:3px;margin-top:1px;}
.rn-st{font-size:7px;letter-spacing:1px;}.rn-sc{font-size:9px;font-weight:700;color:var(--text3);}
.rn-r{text-align:right;flex-shrink:0;}.rn-p{font-size:14px;font-weight:800;color:var(--gold);}.rn-c{font-size:7px;color:var(--text3);}

.swipe-hint{text-align:center;font-size:9px;color:var(--text3);padding:4px 0;opacity:.5;animation:hp 2.5s ease infinite;}
@keyframes hp{0%,100%{opacity:.3}50%{opacity:.7}}

/* ===== GLASS BOTTOM NAV ===== */
.bot-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  padding:8px 12px;z-index:100;display:flex;gap:8px;justify-content:center;}
.glass-btn{
  flex:1;height:44px;border-radius:14px;border:none;cursor:pointer;
  background:linear-gradient(135deg,rgba(160,120,255,.35),rgba(200,160,255,.2));
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.25);
  box-shadow:0 4px 16px rgba(120,80,200,.15),inset 0 1px 0 rgba(255,255,255,.35);
  color:#fff;font-size:11px;font-weight:700;letter-spacing:-.2px;
  display:flex;align-items:center;justify-content:center;gap:4px;
  transition:all .2s;position:relative;text-shadow:0 1px 2px rgba(0,0,0,.15);
}
.glass-btn::before{content:'';position:absolute;top:1px;left:10%;right:10%;height:40%;
  border-radius:10px;background:linear-gradient(180deg,rgba(255,255,255,.3),transparent);pointer-events:none;}
.glass-btn:active{transform:scale(.95);}
.glass-btn .g-icon{font-size:16px;}
.glass-btn.active{background:linear-gradient(135deg,rgba(180,140,255,.5),rgba(220,180,255,.35));
  border-color:rgba(255,255,255,.4);}

/* ===== CATEGORY POPUP ===== */
.cat-overlay{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  z-index:99;pointer-events:none;}
.cat-menu{position:absolute;bottom:60px;left:12px;display:flex;flex-direction:column-reverse;gap:6px;pointer-events:auto;}
.cat-item{
  height:40px;border-radius:12px;padding:0 16px;
  background:linear-gradient(135deg,rgba(140,100,240,.45),rgba(180,140,255,.3));
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.2);
  box-shadow:0 4px 12px rgba(100,60,200,.2),inset 0 1px 0 rgba(255,255,255,.3);
  color:#fff;font-size:12px;font-weight:700;
  display:flex;align-items:center;gap:6px;cursor:pointer;
  transform:translateY(20px);opacity:0;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),opacity .2s;
  text-shadow:0 1px 2px rgba(0,0,0,.15);white-space:nowrap;
}
.cat-item.show{transform:translateY(0);opacity:1;}
.cat-item:active{transform:scale(.95);}
.cat-item .ci-icon{font-size:14px;}
.cat-item.sub{
  background:linear-gradient(135deg,rgba(100,180,255,.4),rgba(140,200,255,.25));
  font-size:11px;height:36px;
}

/* ===== MY INFO PANEL ===== */
.my-panel{position:fixed;top:0;right:-35%;width:35%;max-width:150px;height:auto;
  z-index:90;transition:right .35s cubic-bezier(.4,0,.2,1);
  padding:36px 10px 16px;
  background:linear-gradient(180deg,rgba(160,120,255,.4),rgba(120,80,200,.25));
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-left:1px solid rgba(255,255,255,.2);border-bottom-left-radius:16px;
  box-shadow:-4px 0 24px rgba(100,60,200,.15);color:#fff;
}
.my-panel.open{right:0;}
.my-grade{font-size:9px;font-weight:700;color:rgba(255,255,255,.7);margin-bottom:4px;}
.my-name{font-size:14px;font-weight:900;margin-bottom:8px;}
.my-stat{display:flex;flex-direction:column;gap:6px;}
.my-stat-item{display:flex;justify-content:space-between;align-items:center;}
.my-stat-item .label{font-size:8px;color:rgba(255,255,255,.6);}
.my-stat-item .val{font-size:12px;font-weight:800;}
.my-first{display:flex;align-items:center;gap:4px;margin-top:10px;padding:6px;
  background:rgba(255,215,0,.15);border-radius:8px;border:1px solid rgba(255,215,0,.2);}
.my-first img{width:24px;height:24px;animation:sparkle 2s ease-in-out infinite;}
.my-first span{font-size:9px;font-weight:700;color:#FFD700;}
</style>
</head>
<body>
<div class="device">
<div class="hdr"><div class="logo">OPTION</div></div>
<div class="main" id="mainArea">

<div class="poll">
  <div class="poll-row"><div class="poll-tag">100명에게 물어봐</div><div class="poll-live">73/100</div></div>
  <div class="poll-q">친구가 슬롯 잘하면 여자도 꼬실 수 있다는데?</div>
  <div class="poll-opts">
    <div class="p-opt"><div class="p-bar a"></div><div class="p-text">친구 말이 맞다</div><div class="p-pct">31%</div></div>
    <div class="p-opt"><div class="p-bar b"></div><div class="p-text">사람색기 아니네</div><div class="p-pct w">69%</div></div>
  </div>
</div>

<div class="filter-bar" id="filterBar">
  <div class="f-btn on" data-sort="firstBonus" onclick="setFilter(this)">첫충</div>
  <div class="f-btn" data-sort="reloadBonus" onclick="setFilter(this)">매충</div>
  <div class="f-btn" data-sort="cashback" onclick="setFilter(this)">캐시백</div>
  <div class="f-btn" data-sort="allinBonus" onclick="setFilter(this)">올인</div>
  <div class="f-btn" data-sort="rolling" onclick="setFilter(this)">롤링</div>
  <div class="f-btn" data-sort="rating" onclick="setFilter(this)">별점</div>
</div>

<div class="sec-t">추천 순위 <span id="cnt">10개</span></div>

<div class="row-hero" id="rowH"></div>
<div class="row-sub" id="rowS"></div>
<div class="row-bot" id="rowB"></div>
<div class="swipe-hint">스와이프로 다음 순위</div>
<div class="list-sec" id="listSec"></div>

</div>

<!-- 내정보 패널 -->
<div class="my-panel" id="myPanel">
  <div class="my-grade">DIAMOND MEMBER</div>
  <div class="my-name">OPTION</div>
  <div class="my-stat">
    <div class="my-stat-item"><span class="label">등급</span><span class="val">VIP</span></div>
    <div class="my-stat-item"><span class="label">포인트</span><span class="val">12,500P</span></div>
  </div>
  <div class="my-first">
    <img src="/img/1st.png" alt="1st">
    <span>1위 업체 안내</span>
  </div>
</div>

<!-- 카테고리 팝업 -->
<div class="cat-overlay" id="catOverlay">
  <div class="cat-menu" id="catMenu"></div>
</div>

<!-- 글라스 버튼 4개 -->
<div class="bot-nav">
  <button class="glass-btn" id="btnCat" onclick="toggleCategory()"><span class="g-icon">☰</span>분류</button>
  <button class="glass-btn" onclick="location.href='/register.html'"><span class="g-icon">✏️</span>등록</button>
  <button class="glass-btn"><span class="g-icon">📊</span>비교</button>
  <button class="glass-btn" id="btnMyInfo" onclick="toggleMyPanel()"><span class="g-icon">👤</span>내정보</button>
</div>
</div>

<script>
var currentSort = 'firstBonus';
function sortLabel(key){
  return {firstBonus:'첫충',reloadBonus:'매충',cashback:'캐시백',allinBonus:'올인',rolling:'롤링',rating:'별점'}[key]||key;
}
function sortVal(s,key){
  return {firstBonus:s.f,reloadBonus:s.r,cashback:s.c,allinBonus:s.a||0,rolling:s.rl||0,rating:s.rt}[key]||0;
}

var D=[
  {n:'겜블시티',ef:'GAMBLE CITY',en:'GAMBLE\nCITY',f:15,r:10,c:5,a:8,rl:3.5,rt:9.4,rv:328,u:4520,p:'gold',tag:'Diamond',img:'/img/겜블시티.jpg'},
  {n:'벳콩',ef:'BETKONG',en:'BET\nKONG',f:12,r:8,c:4,a:5,rl:4.0,rt:9.1,rv:245,u:3800,p:'blue',tag:'Premium',img:'/img/bcgame.jpg'},
  {n:'럭키비키',ef:'LUCKY VIKI',en:'LUCKY\nVIKI',f:13,r:9,c:6,a:7,rl:3.0,rt:8.8,rv:190,u:2900,p:'purple',tag:'Hot',img:'/img/럭키비키.jpg'},
  {n:'99벳',ef:'99BET',en:'99\nBET',f:10,r:14,c:5,a:6,rl:3.8,rt:9.0,rv:210,u:3100,p:'cyan',tag:'Top Reload',img:'/img/99벳.jpg'},
  {n:'Astart',ef:'ASTART',en:'A\nSTART',f:11,r:7,c:4,a:9,rl:2.5,rt:8.5,rv:167,u:2400,p:'gold',tag:'Fast',img:'/img/Astart.jpg'},
  {n:'벳33',ef:'BET33',en:'BET\n33',f:8,r:9,c:3,a:5,rl:4.2,rt:7.8,rv:120,u:1600,p:'orange',tag:'Rising',img:'/img/벳33.jpg'},
  {n:'벳38',ef:'BET38',en:'BET\n38',f:9,r:12,c:5,a:4,rl:3.3,rt:8.2,rv:155,u:2100,p:'',tag:'Trusted',img:'/img/벳38.jpg'},
  {n:'올레벳',ef:'OLEBET',en:'OLE\nBET',f:14,r:10,c:3,a:6,rl:3.7,rt:7.2,rv:89,u:1200,p:'',tag:'New',img:'/img/올레벳.jpg'},
  {n:'kslot',ef:'KSLOT',en:'K\nSLOT',f:7,r:13,c:5,a:3,rl:2.8,rt:8.7,rv:200,u:3000,p:'gold',tag:'Slots',img:'/img/kslot.jpg'},
];

// 정렬된 배열
var sorted = [];
function sortData(){
  sorted = D.slice().sort(function(a,b){
    if(currentSort==='rolling') return sortVal(a,currentSort)-sortVal(b,currentSort); // 낮은순
    return sortVal(b,currentSort)-sortVal(a,currentSort); // 높은순
  });
}
sortData();

var N,ci=0,busy=false;
function updateN(){ N=sorted.length; }
updateN();

function S(off,b){return sorted[((b!=null?b:ci)+off)%N];}
function cc(p){return p?'c-'+p:'';}
function $(id){return document.getElementById(id);}

var gearDir=[1,-1,1,-1,1,-1,1,-1,1];
var hts=[180,180,155,155,155,110,110,110,110];
var delays=[0,80,180,300,430,260,400,540,680];
var drumTypes=['d-mob','d-inf','d-sub','d-sub','d-sub','d-bot','d-bot','d-bot','d-bot'];

function buildDrums(){
  [{el:$('rowH'),slots:[0,1]},{el:$('rowS'),slots:[2,3,4]},{el:$('rowB'),slots:[5,6,7,8]}].forEach(function(row){
    var html='';
    row.slots.forEach(function(i){
      var tz=hts[i]/2;
      html+='<div class="drum '+drumTypes[i]+'" id="d'+i+'"><div class="rotor" id="r'+i+'">'+
        '<div class="face" id="ff'+i+'" style="transform:rotateX(0deg) translateZ('+tz+'px)"></div>'+
        '<div class="face" id="fb'+i+'" style="transform:rotateX(180deg) translateZ('+tz+'px)"></div>'+
        '</div></div>';
    });
    row.el.innerHTML=html;
  });
}

function mobH(s){
  return '<div class="mob-in"><img src="'+s.img+'" alt="'+s.n+'" onerror="this.style.display=\'none\'">'+

    '<div class="mob-ov"><div class="mob-tag">'+s.tag+'</div><div class="mob-nm">'+s.n+'</div></div></div>';
}
function infH(s){
  var lbl=sortLabel(currentSort);
  var val=sortVal(s,currentSort);
  var unit=currentSort==='rating'?'':'%';
  return '<div class="inf-in"><div class="inf-glow"></div>'+
    '<div class="inf-tier">'+s.tag+'</div>'+
    '<div class="inf-name '+cc(s.p)+'">'+s.en.replace('\n','<br>')+'</div>'+
    '<div class="inf-val-label">'+lbl+'</div>'+

    '<span class="inf-meta">'+s.rv+'건 '+s.u+'명</span></div></div>';
}
function subH(s){
  var val=sortVal(s,currentSort);
  var unit=currentSort==='rating'?'':'%';
  var tc=s.p||'gold';
  return '<div class="sub-in"><div class="sub-img"><img src="'+s.img+'" alt="'+s.n+'" onerror="this.style.display=\'none\'">'+

function botH(s){
  var val=sortVal(s,currentSort);
  var unit=currentSort==='rating'?'':'%';
  return '<div class="bot-in"><div class="bot-img"><img src="'+s.img+'" alt="'+s.n+'" onerror="this.style.display=\'none\'"></div>'+
    '<div class="bot-body"><div class="bot-nm '+cc(s.p)+'">'+s.ef+'</div><div class="bot-kr">'+s.n+'</div>'+
    '<div class="bot-v">'+val+unit+'</div></div></div>';
}
function slotHTML(i,b){
  if(i===0) return mobH(S(0,b));
  if(i===1) return infH(S(0,b));
  if(i<=4) return subH(S(i-1,b));
  return botH(S(i-1,b));
}

function fillFronts(b){
  for(var i=0;i<=8;i++) $('ff'+i).innerHTML=slotHTML(i,b);
}
function fillList(b){
  var lh='';
  for(var i=8;i<N;i++){
    var s=S(i,b);
    var val=sortVal(s,currentSort);
    var unit=currentSort==='rating'?'':'%';
    lh+='<div class="rn"><div class="rn-logo"><img src="'+s.img+'" alt="'+s.n+'"></div>'+
      '<div class="rn-i"><div class="rn-nm">'+s.n+'</div><div class="rn-m"><span class="rn-st">&#11088;</span><span class="rn-sc">'+s.rt+'</span></div></div>'+
      '<div class="rn-r"><div class="rn-p">'+val+unit+'</div><div class="rn-c">'+sortLabel(currentSort)+'</div></div></div>';
  }
  $('listSec').innerHTML=lh;
}

// ===== GEAR CASCADE =====
function gearCascade(dir){
  if(busy) return;
  busy=true;
  var nextCi=dir==='next'?(ci+1)%N:(ci-1+N)%N;
  if(nextCi===ci){busy=false;return;}
  var baseAngle=dir==='next'?-180:180;
  for(var i=0;i<=8;i++) $('fb'+i).innerHTML=slotHTML(i,nextCi);
  var maxEnd=0;
  for(var i=0;i<=8;i++){
    (function(idx){
      var angle=baseAngle*gearDir[idx];
      var delay=delays[idx];
      var dur=550+idx*40;
      var end=delay+dur;
      if(end>maxEnd) maxEnd=end;
      setTimeout(function(){
        var r=$('r'+idx);
        r.style.transition='transform '+dur+'ms cubic-bezier(.22,1,.36,1)';
        r.style.transform='rotateX('+angle+'deg)';
      },delay);
    })(i);
  }
  setTimeout(function(){
    ci=nextCi;
    for(var i=0;i<=8;i++){
      var r=$('r'+i);
      r.style.transition='none';
      r.style.transform='';
      $('ff'+i).innerHTML=$('fb'+i).innerHTML;
      $('fb'+i).innerHTML='';
    }
    fillList(ci);
    busy=false;
  },maxEnd+50);
}

// ===== SMOOTH TOUCH =====
(function(){
  var a=$('mainArea'),sx=0,sy=0,st=0;
  a.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();},{passive:true});
  a.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy,dt=Date.now()-st;
    if(dt>500) return;
    if(Math.abs(dy)>30&&Math.abs(dy)>Math.abs(dx)*0.6){
      if(dy<0) gearCascade('next'); else gearCascade('prev');
    } else if(Math.abs(dx)>30){
      if(dx<0) gearCascade('next'); else gearCascade('prev');
    }
  },{passive:true});
  var md=false;
  a.addEventListener('mousedown',function(e){md=true;sx=e.clientX;sy=e.clientY;st=Date.now();});
  a.addEventListener('mouseup',function(e){
    if(!md)return;md=false;
    var dx=e.clientX-sx,dy=e.clientY-sy,dt=Date.now()-st;
    if(dt>500)return;
    if(Math.abs(dy)>30&&Math.abs(dy)>Math.abs(dx)*0.6){if(dy<0)gearCascade('next');else gearCascade('prev');}
    else if(Math.abs(dx)>30){if(dx<0)gearCascade('next');else gearCascade('prev');}
  });
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowUp'||e.key==='ArrowRight')gearCascade('next');
    if(e.key==='ArrowDown'||e.key==='ArrowLeft')gearCascade('prev');
  });
})();

var at=setInterval(function(){if(!document.hidden)gearCascade('next');},6000);
document.addEventListener('touchstart',function(){clearInterval(at);},{once:true});

buildDrums();
fillFronts(ci);
fillList(ci);

function openMain(){
  var menu=$('catMenu');menu.innerHTML='';
  ['sports','casino','slot','virtual'].forEach(function(id,idx){
    var c=categories.find(function(x){return x.id===id;});
    var el=document.createElement('div');el.className='cat-item';
    el.innerHTML='<span class="ci-icon">'+c.icon+'</span>'+c.name;
    el.onclick=function(){openSub(id);};

    setTimeout(function(){el.classList.add('show');},idx*60);

function openSub(catId){
  selectedCat=catId;var menu=$('catMenu');
  menu.querySelectorAll('.cat-item').forEach(function(el){el.classList.remove('show');});
  setTimeout(function(){
    menu.innerHTML='';
    (subCategories[catId]||[]).forEach(function(s,idx){
      var el=document.createElement('div');el.className='cat-item sub';el.innerHTML=s.name;
      el.onclick=function(){selectSub(catId,s.sort);};
      menu.appendChild(el);
      setTimeout(function(){el.classList.add('show');},idx*50);

}
function closeAll(){
  var menu=$('catMenu');
  var items=Array.prototype.slice.call(menu.querySelectorAll('.cat-item'));
  items.reverse().forEach(function(el,idx){setTimeout(function(){el.classList.remove('show');},idx*40);});
  setTimeout(function(){menu.innerHTML='';catState=0;selectedCat='';$('btnCat').classList.remove('active');},items.length*40+200);
}
document.addEventListener('click',function(e){
  if(catState>0&&!e.target.closest('.cat-menu')&&!e.target.closest('#btnCat'))closeAll();
});
