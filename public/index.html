<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>OPTION</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--gold:#C47F17;--gold2:#8B5A0B;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Sora',-apple-system,sans-serif;background:var(--bg);color:#fff;-webkit-font-smoothing:antialiased;}

/* Container */
.wrap{width:100%;max-width:430px;height:100%;margin:0 auto;position:relative;overflow:hidden;}

/* Header */
.hdr{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(180deg,rgba(10,10,10,.95) 0%,transparent 100%);}
.logo{font-weight:800;font-size:16px;letter-spacing:-1px;background:linear-gradient(135deg,#C47F17,#E8A840);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.cat-pills{display:flex;gap:6px;}
.cat-pill{padding:4px 10px;border-radius:100px;font-size:10px;font-weight:600;color:rgba(255,255,255,.4);background:rgba(255,255,255,.08);border:none;cursor:pointer;transition:.2s;}
.cat-pill.on{color:#fff;background:var(--gold);}

/* Snap Scroll Container */
.slides{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.slides::-webkit-scrollbar{display:none;}

/* Each Slide */
.slide{height:100%;scroll-snap-align:start;scroll-snap-stop:always;position:relative;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;}

/* Background Image */
.slide-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .6s ease;}
.slide-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.85) 0%,rgba(0,0,0,.2) 40%,rgba(0,0,0,.1) 60%,rgba(0,0,0,.4) 100%);}

/* No image fallback */
.slide-bg.no-img{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);}

/* Content */
.slide-content{position:relative;z-index:2;padding:0 20px 100px;}

/* Rank Badge */
.rank{display:inline-flex;align-items:center;gap:6px;margin-bottom:12px;}
.rank-num{font-size:48px;font-weight:800;letter-spacing:-3px;line-height:1;background:linear-gradient(135deg,#FFD700,#C47F17);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;filter:drop-shadow(0 2px 8px rgba(196,127,23,.3));}
.rank-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:2px;}

/* Site Name */
.site-name{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1.2;margin-bottom:8px;text-shadow:0 2px 12px rgba(0,0,0,.5);}

/* Badges */
.badges{display:flex;gap:6px;margin-bottom:14px;}
.badge{padding:3px 8px;border-radius:6px;font-size:9px;font-weight:700;}
.badge-ins{background:rgba(38,96,212,.25);color:#60a5fa;border:1px solid rgba(38,96,212,.3);}
.badge-opt{background:rgba(196,127,23,.25);color:#fbbf24;border:1px solid rgba(196,127,23,.3);}
.badge-cat{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.1);}

/* Stats Grid */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.stat{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border-radius:10px;padding:10px 6px;text-align:center;border:1px solid rgba(255,255,255,.06);}
.stat-val{font-size:20px;font-weight:800;letter-spacing:-1px;color:#fff;}
.stat-val.gold{color:var(--gold);}
.stat-label{font-size:8px;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

/* Rating */
.rating-row{display:flex;align-items:center;gap:8px;}
.stars{font-size:14px;letter-spacing:2px;filter:saturate(1.5);}
.rating-score{font-size:18px;font-weight:800;color:var(--gold);}
.rating-sub{font-size:10px;color:rgba(255,255,255,.4);}

/* Link Button */
.site-link{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:10px 20px;border-radius:100px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;font-size:12px;font-weight:700;text-decoration:none;border:none;cursor:pointer;transition:.2s;}
.site-link:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(196,127,23,.3);}

/* Side Indicators */
.indicators{position:fixed;right:8px;top:50%;transform:translateY(-50%);z-index:90;display:flex;flex-direction:column;gap:6px;}
.ind{width:4px;height:16px;border-radius:2px;background:rgba(255,255,255,.15);transition:.3s;}
.ind.on{height:28px;background:var(--gold);}

/* Scroll Arrow */
.scroll-hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:4px;animation:bounce 2s ease infinite;opacity:.5;}
.scroll-hint span{font-size:8px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:1px;text-transform:uppercase;}
.scroll-arrow{width:20px;height:20px;border-right:2px solid rgba(255,255,255,.4);border-bottom:2px solid rgba(255,255,255,.4);transform:rotate(45deg);}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}

/* Empty State */
.empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.3);}
.empty-ic{font-size:48px;margin-bottom:12px;}
.empty-t{font-size:14px;font-weight:600;}

/* Bottom Nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100;display:flex;justify-content:center;gap:24px;padding:12px 0 20px;background:linear-gradient(0deg,rgba(10,10,10,.98) 0%,transparent 100%);}
.bnav a{color:rgba(255,255,255,.3);text-decoration:none;font-size:9px;font-weight:600;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.2s;}
.bnav a.on{color:var(--gold);}
.bnav a span{font-size:18px;}
</style>
</head>
<body>
<div class="wrap">
  <!-- Header -->
  <div class="hdr">
    <div class="logo">OPTION</div>
    <div class="cat-pills">
      <button class="cat-pill on" onclick="filterCat('all')">ALL</button>
      <button class="cat-pill" onclick="filterCat('casino')">Casino</button>
      <button class="cat-pill" onclick="filterCat('slot')">Slot</button>
      <button class="cat-pill" onclick="filterCat('sports')">Sports</button>
      <button class="cat-pill" onclick="filterCat('etc')">ETC</button>
    </div>
  </div>

  <!-- Slides -->
  <div class="slides" id="slides"></div>

  <!-- Side Indicators -->
  <div class="indicators" id="indicators"></div>

  <!-- Bottom Nav -->
  <div class="bnav">
    <a href="/" class="on"><span>🏆</span>순위</a>
    <a href="/admin.html"><span>⚙️</span>관리</a>
  </div>
</div>

<script>
var allSites = [];
var currentCat = 'all';
var currentSlide = 0;

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-pill').forEach(function(p) {
    p.classList.toggle('on', p.textContent.toLowerCase() === (cat === 'all' ? 'all' : cat));
  });
  renderSlides();
}

function getFiltered() {
  var filtered = currentCat === 'all' ? allSites : allSites.filter(function(s) { return s.category === currentCat; });
  return filtered;
}

function getCatLabel(cat) {
  var m = { casino: '카지노', slot: '슬롯', sports: '스포츠', etc: 'ETC' };
  return m[cat] || cat;
}

function renderSlides() {
  var sites = getFiltered();
  var el = document.getElementById('slides');
  var indEl = document.getElementById('indicators');

  if (!sites.length) {
    el.innerHTML = '<div class="slide"><div class="empty"><div class="empty-ic">📋</div><div class="empty-t">등록된 업체가 없습니다</div></div></div>';
    indEl.innerHTML = '';
    return;
  }

  var h = '';
  sites.forEach(function(s, i) {
    var bgClass = s.image ? '' : ' no-img';
    var bgStyle = s.image ? 'background-image:url(' + s.image + ')' : '';
    var rank = i + 1;

    h += '<div class="slide">';
    h += '<div class="slide-bg' + bgClass + '" style="' + bgStyle + '"></div>';
    h += '<div class="slide-content">';

    // Rank
    h += '<div class="rank"><div class="rank-num">' + rank + '</div>';
    h += '<div class="rank-label">' + (rank === 1 ? 'BEST PICK' : rank <= 3 ? 'TOP ' + rank : 'RANK') + '</div></div>';

    // Name
    h += '<div class="site-name">' + s.name + '</div>';

    // Badges
    h += '<div class="badges">';
    h += '<span class="badge badge-cat">' + getCatLabel(s.category) + '</span>';
    if (s.insurance) h += '<span class="badge badge-ins">🛡 보험</span>';
    if (s.option) h += '<span class="badge badge-opt">⭐ 옵션</span>';
    h += '</div>';

    // Stats
    h += '<div class="stats">';
    h += '<div class="stat"><div class="stat-val gold">' + s.firstBonus + '%</div><div class="stat-label">첫충</div></div>';
    h += '<div class="stat"><div class="stat-val">' + s.reloadBonus + '%</div><div class="stat-label">매충</div></div>';
    h += '<div class="stat"><div class="stat-val">' + s.cashback + '%</div><div class="stat-label">캐시백</div></div>';
    h += '<div class="stat"><div class="stat-val gold">' + s.allinBonus + '%</div><div class="stat-label">올인</div></div>';
    h += '<div class="stat"><div class="stat-val">' + (s.joinBonus || 0).toLocaleString() + '</div><div class="stat-label">가입머니</div></div>';
    h += '<div class="stat"><div class="stat-val">' + s.rolling + '%</div><div class="stat-label">롤링</div></div>';
    h += '</div>';

    // Rating
    h += '<div class="rating-row">';
    h += '<div class="stars">⭐⭐⭐⭐⭐</div>';
    h += '<div class="rating-score">' + (s.rating || 0).toFixed(1) + '</div>';
    h += '<div class="rating-sub">' + (s.reviews || 0) + '건 리뷰</div>';
    h += '</div>';

    // Link
    if (s.link) {
      h += '<a class="site-link" href="' + s.link + '" target="_blank">가입하기 →</a>';
    }

    h += '</div>'; // slide-content

    // Scroll hint on first slide
    if (i === 0 && sites.length > 1) {
      h += '<div class="scroll-hint"><span>SCROLL</span><div class="scroll-arrow"></div></div>';
    }

    h += '</div>'; // slide
  });

  el.innerHTML = h;

  // Indicators
  var indH = '';
  sites.forEach(function(s, i) {
    indH += '<div class="ind' + (i === 0 ? ' on' : '') + '"></div>';
  });
  indEl.innerHTML = indH;

  currentSlide = 0;
}

// Track scroll position for indicators
function setupScrollTracker() {
  var el = document.getElementById('slides');
  el.addEventListener('scroll', function() {
    var slideH = el.clientHeight;
    var idx = Math.round(el.scrollTop / slideH);
    if (idx !== currentSlide) {
      currentSlide = idx;
      document.querySelectorAll('.ind').forEach(function(ind, i) {
        ind.classList.toggle('on', i === idx);
      });
      // Hide scroll hint after first scroll
      var hint = document.querySelector('.scroll-hint');
      if (hint) hint.style.display = 'none';
    }
  });
}

// Load from API
function loadSites() {
  fetch('/api/sites')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      allSites = data;
      renderSlides();
      setupScrollTracker();
    })
    .catch(function(e) {
      console.log('API error:', e);
      renderSlides();
      setupScrollTracker();
    });
}

loadSites();
</script>
</body>
</html>
