<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>OPTION</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F2F0ED;--card:rgba(255,255,255,.72);--text:#1A1A1A;--text2:#777;--text3:#B0B0B0;--gold:#C47F17;--gold-l:#FEF5E7;--green:#1A8C5E;--green-l:#E8F8F0;--blue:#2660D4;--blue-l:#EBF2FE;--red:#DC2626;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Sora',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;-webkit-font-smoothing:antialiased;}
.device{width:100%;max-width:430px;min-height:100vh;position:relative;overflow-y:auto;overflow-x:hidden;background:var(--bg);padding-bottom:90px;}
.device::-webkit-scrollbar{display:none;}
.mesh-bg{position:fixed;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle at 30% 40%,rgba(254,213,118,.2) 0%,transparent 60%);filter:blur(60px);pointer-events:none;z-index:0;}

.status{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 6px;font-size:14px;font-weight:600;position:sticky;top:0;z-index:50;background:rgba(242,240,237,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.status-r{font-size:11px;color:var(--text3);}
.hdr{padding:4px 20px 14px;position:relative;z-index:2;}
.hdr-row{display:flex;align-items:center;justify-content:space-between;}
.logo{font-weight:800;font-size:28px;letter-spacing:-2px;background:linear-gradient(135deg,#C47F17,#8B5A0B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr-icons{display:flex;gap:8px;}
.h-btn{width:36px;height:36px;border-radius:50%;background:var(--card);backdrop-filter:blur(20px);border:1px solid rgba(0,0,0,.04);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.03);}

.page{display:none;position:relative;z-index:2;}.page.on{display:block;}

/* POLL */
.poll{margin:0 14px 14px;border-radius:18px;background:var(--card);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.6);padding:14px 16px 12px;box-shadow:0 4px 20px rgba(0,0,0,.03);overflow:hidden;position:relative;}
.poll::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:18px 18px 0 0;background:linear-gradient(90deg,var(--gold),var(--blue),var(--gold));background-size:200% 100%;animation:sh 3s ease infinite;}
@keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
.poll-row{display:flex;align-items:center;justify-content:space-between;}
.poll-tag{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;}
.poll-live{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:100px;background:var(--green-l);color:var(--green);font-size:9px;font-weight:700;}
.p-dot{width:4px;height:4px;border-radius:50%;background:var(--green);animation:pd 1.5s ease infinite;}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.3}}
.poll-q{font-size:14px;font-weight:700;line-height:1.4;letter-spacing:-.3px;margin:8px 0;}
.poll-opts{display:flex;gap:6px;}
.p-opt{flex:1;padding:8px;border-radius:10px;background:rgba(0,0,0,.03);position:relative;overflow:hidden;text-align:center;cursor:pointer;}
.p-bar{position:absolute;left:0;top:0;bottom:0;border-radius:10px;}.p-bar.a{background:rgba(38,96,212,.05);width:31%;}.p-bar.b{background:rgba(196,127,23,.07);width:69%;}
.p-text{font-size:10px;font-weight:600;position:relative;z-index:1;}
.p-pct{font-size:13px;font-weight:800;position:relative;z-index:1;margin-top:1px;color:var(--text3);}.p-pct.w{color:var(--gold);}

/* MAIN */
.main{display:flex;gap:0;}
.cat-bar{width:54px;flex-shrink:0;padding:0 2px 20px 10px;position:sticky;top:60px;align-self:flex-start;max-height:calc(100vh - 70px);overflow-y:auto;scrollbar-width:none;}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-group{margin-bottom:2px;}
.cat-main{width:44px;padding:8px 0;border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:7px;font-weight:700;color:var(--text3);background:transparent;border:none;cursor:pointer;transition:all .3s;text-align:center;line-height:1.15;}
.cat-main .cat-ic{font-size:16px;transition:transform .3s;}
.cat-main.open .cat-ic{transform:scale(1.1);}
.cat-main.open{color:var(--text);background:var(--card);backdrop-filter:blur(12px);box-shadow:0 2px 8px rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.03);}
.cat-main .arrow{font-size:7px;color:var(--text3);transition:transform .3s;display:block;margin-top:1px;}
.cat-main.open .arrow{transform:rotate(180deg);}
.cat-subs{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s;opacity:0;}
.cat-subs.open{opacity:1;}
.cat-sub{width:42px;margin:1px 0 1px 1px;padding:7px 2px;border-radius:8px;display:flex;flex-direction:column;align-items:center;font-size:6.5px;font-weight:600;color:var(--text3);background:transparent;border:none;cursor:pointer;transition:all .2s;text-align:center;line-height:1.15;}
.cat-sub.on{color:var(--gold);background:var(--gold-l);font-weight:700;}
.cat-sub .sub-ic{font-size:12px;display:block;margin-bottom:1px;}

.content{flex:1;padding:0 10px 16px 4px;min-width:0;}
.sec-t{font-size:16px;font-weight:800;letter-spacing:-.6px;margin-bottom:8px;}
.sec-t span{font-size:11px;font-weight:500;color:var(--text3);}

.rk{display:flex;flex-direction:column;gap:7px;}
.r1{border-radius:18px;padding:14px;position:relative;overflow:hidden;background:linear-gradient(145deg,#FFFDF8,#FFF8ED,#FFF4E0);border:1.5px solid rgba(196,127,23,.12);box-shadow:0 6px 24px rgba(196,127,23,.05);}
.r1-glow{position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(196,127,23,.07),transparent 70%);}
.r1-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;position:relative;z-index:2;}
.r1-num{width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,#D4920F,#A06B08);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white;box-shadow:0 2px 8px rgba(196,127,23,.2);}
.r1-name{font-size:16px;font-weight:800;letter-spacing:-.5px;}
.r1-bdg{display:flex;gap:3px;margin-left:auto;}
.bdg{padding:2px 6px;border-radius:5px;font-size:8px;font-weight:700;}
.bdg-i{background:var(--blue-l);color:var(--blue);}.bdg-o{background:var(--gold-l);color:var(--gold);}
.r1-img{width:100%;height:90px;border-radius:12px;object-fit:cover;margin-bottom:10px;position:relative;z-index:2;}
.r1-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:10px;position:relative;z-index:2;}
.r1-cell{padding:8px 3px;border-radius:10px;background:rgba(255,255,255,.6);backdrop-filter:blur(8px);text-align:center;}
.r1-cl{font-size:7.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.2px;}
.r1-cv{font-size:18px;font-weight:800;margin-top:2px;letter-spacing:-.8px;}.r1-cv.gd{color:var(--gold);}
.r1-cs{font-size:7px;color:var(--text3);margin-top:1px;}
.r1-bot{display:flex;align-items:center;gap:5px;position:relative;z-index:2;}
.r1-st{font-size:11px;letter-spacing:2px;filter:saturate(1.5) brightness(1.05);}
.r1-sc{font-size:15px;font-weight:800;color:var(--gold);}
.r1-rv{font-size:9px;color:var(--text3);margin-left:auto;}

.rn{border-radius:14px;padding:10px 12px;background:var(--card);backdrop-filter:blur(20px);border:1px solid rgba(0,0,0,.04);display:flex;align-items:center;gap:8px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.02);}
.rn-n{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.rn-n.s{background:rgba(0,0,0,.05);color:var(--text2);}.rn-n.b{background:rgba(0,0,0,.03);color:var(--text3);}
.rn-i{flex:1;min-width:0;}
.rn-nm{font-size:13px;font-weight:700;letter-spacing:-.2px;}.rn-nm.d{color:var(--text2);}
.rn-m{display:flex;align-items:center;gap:3px;margin-top:1px;}
.rn-st2{font-size:8px;letter-spacing:1px;}.rn-st2.m{opacity:.4;}.rn-st2.d{opacity:.13;filter:grayscale(1);}
.rn-sc2{font-size:9px;font-weight:700;color:var(--text3);}
.dots{display:flex;gap:2px;}.dt{width:3px;height:3px;border-radius:50%;}.dt-i{background:var(--blue);}.dt-o{background:var(--gold);}
.rn-r{text-align:right;flex-shrink:0;}
.rn-p{font-size:15px;font-weight:800;letter-spacing:-.4px;}.rn-p.h{color:var(--text);}.rn-p.m{color:var(--text2);}
.rn-c{font-size:8px;color:var(--text3);margin-top:1px;}
.rn-img{width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.rm{border-radius:10px;padding:9px 10px;background:var(--card);backdrop-filter:blur(8px);border:1px solid rgba(0,0,0,.02);display:flex;align-items:center;gap:6px;opacity:.4;}
.rm-n{font-size:10px;font-weight:700;color:var(--text3);width:14px;text-align:center;}
.rm-nm{font-size:12px;font-weight:600;color:var(--text2);flex:1;}
.rm-v{font-size:12px;font-weight:700;color:var(--text3);}

/* REGISTER */
.reg-page{padding:0 16px;}
.reg-title{font-size:22px;font-weight:800;letter-spacing:-1px;margin-bottom:16px;}
.reg-form{display:flex;flex-direction:column;gap:10px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:11px;font-weight:700;color:var(--text2);}
.fg input,.fg select{padding:10px 14px;border-radius:12px;border:1.5px solid rgba(0,0,0,.08);background:white;font-size:14px;font-family:'Sora',sans-serif;outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:var(--gold);}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.fg-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.upload-box{width:100%;height:140px;border:2px dashed rgba(0,0,0,.1);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;background:white;}
.upload-box:active{border-color:var(--gold);background:var(--gold-l);}
.upload-box .ub-ic{font-size:36px;margin-bottom:6px;}
.upload-box .ub-text{font-size:11px;color:var(--text3);}
.upload-preview{width:100%;height:140px;border-radius:16px;object-fit:cover;display:none;}
.check-row{display:flex;gap:16px;align-items:center;}
.check-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;cursor:pointer;}
.check-item input{width:18px;height:18px;accent-color:var(--gold);}
.submit-btn{padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#D4920F,#A06B08);color:white;font-size:15px;font-weight:800;cursor:pointer;transition:all .15s;box-shadow:0 4px 16px rgba(196,127,23,.2);margin-top:8px;}
.submit-btn:active{transform:scale(.97);}
.msg{padding:10px;border-radius:10px;font-size:12px;font-weight:600;text-align:center;display:none;margin-top:8px;}
.msg.ok{display:block;background:var(--green-l);color:var(--green);}
.msg.err{display:block;background:#FEE;color:var(--red);}

/* BOTTOM NAV - 2 LEFT + SPACE + 2 RIGHT */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;align-items:flex-end;padding:0 16px 0;background:rgba(242,240,237,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(0,0,0,.04);z-index:100;}
.nav-side{display:flex;flex:1;justify-content:center;gap:0;}
.nav-center{width:60px;flex-shrink:0;}
.nv{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:600;color:var(--text3);cursor:pointer;padding:10px 16px 28px;border-radius:0;transition:all .2s;position:relative;flex:1;}
.nv:active{transform:scale(.9);}
.nv.on{color:var(--text);}
.nv.on::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:3px;border-radius:0 0 3px 3px;background:var(--gold);}
.nv-ic{font-size:22px;line-height:1;}
.nv-lb{font-size:9px;}

/* EMPTY STATE */
.empty{text-align:center;padding:50px 20px;color:var(--text3);}
.empty-ic{font-size:56px;margin-bottom:12px;}
.empty-t{font-size:15px;font-weight:700;color:var(--text2);margin-bottom:6px;}
.empty-d{font-size:12px;line-height:1.5;}
</style>
</head>
<body>
<div class="device">
<div class="mesh-bg"></div>
<div class="status">3:43 <span class="status-r">5G</span></div>
<div class="hdr"><div class="hdr-row"><div class="logo">OPTION</div><div class="hdr-icons"><div class="h-btn">🔔</div><div class="h-btn">👤</div></div></div></div>

<!-- PAGE: RANKING -->
<div class="page on" id="pageRank">
<div class="poll">
  <div class="poll-row"><div class="poll-tag">100명에게 물어봐</div><div class="poll-live"><span class="p-dot"></span> 73/100</div></div>
  <div class="poll-q">친구가 슬롯 잘하면 여자도 꼬실 수 있다는데? 🤔</div>
  <div class="poll-opts">
    <div class="p-opt"><div class="p-bar a"></div><div class="p-text">친구 말이 맞다</div><div class="p-pct">31%</div></div>
    <div class="p-opt"><div class="p-bar b"></div><div class="p-text">사람색기 아니네</div><div class="p-pct w">69%</div></div>
  </div>
</div>
<div class="main">
  <div class="cat-bar">
    <div class="cat-group"><button class="cat-main open" onclick="toggleCat(this)"><span class="cat-ic">🃏</span>카지노<span class="arrow">▾</span></button><div class="cat-subs open" style="max-height:400px;">
      <button class="cat-sub on" onclick="sel(this,'카지노 첫충')"><span class="sub-ic">💎</span>첫충</button>
      <button class="cat-sub" onclick="sel(this,'카지노 매충')"><span class="sub-ic">🔄</span>매충</button>
      <button class="cat-sub" onclick="sel(this,'카지노 캐시백')"><span class="sub-ic">💰</span>캐시백</button>
      <button class="cat-sub" onclick="sel(this,'카지노 올인')"><span class="sub-ic">🔥</span>올인</button>
      <button class="cat-sub" onclick="sel(this,'카지노 가입')"><span class="sub-ic">👋</span>가입</button>
      <button class="cat-sub" onclick="sel(this,'카지노 이벤트')"><span class="sub-ic">🎉</span>이벤트</button>
      <button class="cat-sub" onclick="sel(this,'카지노 롤링')"><span class="sub-ic">📊</span>롤링</button>
    </div></div>
    <div class="cat-group"><button class="cat-main" onclick="toggleCat(this)"><span class="cat-ic">🎰</span>슬롯<span class="arrow">▾</span></button><div class="cat-subs">
      <button class="cat-sub" onclick="sel(this,'슬롯 첫충')"><span class="sub-ic">💎</span>첫충</button>
      <button class="cat-sub" onclick="sel(this,'슬롯 매충')"><span class="sub-ic">🔄</span>매충</button>
      <button class="cat-sub" onclick="sel(this,'슬롯 캐시백')"><span class="sub-ic">💰</span>캐시백</button>
      <button class="cat-sub" onclick="sel(this,'슬롯 올인')"><span class="sub-ic">🔥</span>올인</button>
      <button class="cat-sub" onclick="sel(this,'슬롯 가입')"><span class="sub-ic">👋</span>가입</button>
      <button class="cat-sub" onclick="sel(this,'슬롯 이벤트')"><span class="sub-ic">🎉</span>이벤트</button>
      <button class="cat-sub" onclick="sel(this,'슬롯 롤링')"><span class="sub-ic">📊</span>롤링</button>
    </div></div>
    <div class="cat-group"><button class="cat-main" onclick="toggleCat(this)"><span class="cat-ic">⚽</span>스포츠<span class="arrow">▾</span></button><div class="cat-subs">
      <button class="cat-sub" onclick="sel(this,'스포츠 첫충')"><span class="sub-ic">💎</span>첫충</button>
      <button class="cat-sub" onclick="sel(this,'스포츠 매충')"><span class="sub-ic">🔄</span>매충</button>
      <button class="cat-sub" onclick="sel(this,'스포츠 캐시백')"><span class="sub-ic">💰</span>캐시백</button>
      <button class="cat-sub" onclick="sel(this,'스포츠 올인')"><span class="sub-ic">🔥</span>올인</button>
      <button class="cat-sub" onclick="sel(this,'스포츠 가입')"><span class="sub-ic">👋</span>가입</button>
      <button class="cat-sub" onclick="sel(this,'스포츠 이벤트')"><span class="sub-ic">🎉</span>이벤트</button>
      <button class="cat-sub" onclick="sel(this,'스포츠 롤링')"><span class="sub-ic">📊</span>롤링</button>
    </div></div>
    <div class="cat-group"><button class="cat-main" onclick="toggleCat(this)"><span class="cat-ic">⚙️</span>ETC<span class="arrow">▾</span></button><div class="cat-subs">
      <button class="cat-sub" onclick="sel(this,'ETC 첫충')"><span class="sub-ic">💎</span>첫충</button>
      <button class="cat-sub" onclick="sel(this,'ETC 매충')"><span class="sub-ic">🔄</span>매충</button>
      <button class="cat-sub" onclick="sel(this,'ETC 캐시백')"><span class="sub-ic">💰</span>캐시백</button>
      <button class="cat-sub" onclick="sel(this,'ETC 올인')"><span class="sub-ic">🔥</span>올인</button>
      <button class="cat-sub" onclick="sel(this,'ETC 가입')"><span class="sub-ic">👋</span>가입</button>
      <button class="cat-sub" onclick="sel(this,'ETC 이벤트')"><span class="sub-ic">🎉</span>이벤트</button>
      <button class="cat-sub" onclick="sel(this,'ETC 롤링')"><span class="sub-ic">📊</span>롤링</button>
    </div></div>
  </div>
  <div class="content">
    <div class="sec-t" id="secTitle">카지노 첫충 <span id="siteCount">0개</span></div>
    <div class="rk" id="rankList"></div>
  </div>
</div>
</div>

<!-- PAGE: EVENT -->
<div class="page" id="pageEvent">
<div class="empty"><div class="empty-ic">🎁</div><div class="empty-t">이벤트</div><div class="empty-d">매일 0시 이벤트가 열립니다<br>업체별 쿠폰 이벤트 진행 예정</div></div>
</div>

<!-- PAGE: REGISTER -->
<div class="page" id="pageReg">
<div class="reg-page">
  <div class="reg-title">업체 등록 ✨</div>
  <div class="reg-form" id="regForm">
    <div class="fg"><label>업체명</label><input type="text" id="rName" placeholder="업체 이름 입력"></div>
    <div class="fg"><label>카테고리</label><select id="rCat"><option value="casino">🃏 카지노</option><option value="slot">🎰 슬롯</option><option value="sports">⚽ 스포츠</option><option value="etc">⚙️ ETC</option></select></div>
    <div class="fg"><label>사이트 대표 이미지</label>
      <div class="upload-box" id="uploadBox" onclick="document.getElementById('rImage').click();">
        <div class="ub-ic">📷</div>
        <div class="ub-text">터치하여 이미지 업로드<br>(5MB 이하)</div>
      </div>
      <img class="upload-preview" id="preview">
      <input type="file" id="rImage" accept="image/*" hidden>
    </div>
    <div class="fg-row">
      <div class="fg"><label>첫충 보너스 %</label><input type="number" id="rFirst" placeholder="0"></div>
      <div class="fg"><label>매충 보너스 %</label><input type="number" id="rReload" placeholder="0"></div>
    </div>
    <div class="fg-row3">
      <div class="fg"><label>캐시백 %</label><input type="number" id="rCash" placeholder="0"></div>
      <div class="fg"><label>올인 %</label><input type="number" id="rAllin" placeholder="0"></div>
      <div class="fg"><label>가입보너스</label><input type="number" id="rJoin" placeholder="0"></div>
    </div>
    <div class="fg-row">
      <div class="fg"><label>롤링 요율 %</label><input type="number" id="rRolling" placeholder="0"></div>
      <div class="fg"><label>이벤트 수</label><input type="number" id="rEvent" placeholder="0"></div>
    </div>
    <div class="check-row">
      <label class="check-item"><input type="checkbox" id="rIns"> 🛡 보험 가입</label>
      <label class="check-item"><input type="checkbox" id="rOpt"> ✨ 옵션 패키지</label>
    </div>
    <button class="submit-btn" onclick="submitSite()">등록하기</button>
    <div class="msg" id="regMsg"></div>
  </div>
</div>
</div>

<!-- PAGE: MY -->
<div class="page" id="pageMy">
<div class="empty"><div class="empty-ic">👤</div><div class="empty-t">내 정보</div><div class="empty-d">로그인하여 등급을 확인하세요<br>등급에 따라 혜택이 달라집니다</div></div>
</div>

</div>

<!-- BOTTOM NAV: LEFT 2 + CENTER SPACE + RIGHT 2 -->
<div class="nav">
  <div class="nav-side">
    <div class="nv on" onclick="goPage('pageRank',this)"><span class="nv-ic">🏆</span><span class="nv-lb">순위</span></div>
    <div class="nv" onclick="goPage('pageEvent',this)"><span class="nv-ic">🎁</span><span class="nv-lb">이벤트</span></div>
  </div>
  <div class="nav-center"></div>
  <div class="nav-side">
    <div class="nv" onclick="goPage('pageReg',this)"><span class="nv-ic">📝</span><span class="nv-lb">등록</span></div>
    <div class="nv" onclick="goPage('pageMy',this)"><span class="nv-ic">👤</span><span class="nv-lb">내정보</span></div>
  </div>
</div>

<script>
function goPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  document.querySelectorAll('.nv').forEach(n => n.classList.remove('on'));
  el.classList.add('on');
  if (id === 'pageRank') loadSites();
  window.scrollTo(0,0);
}
function toggleCat(btn) {
  var g = btn.closest('.cat-group'), s = g.querySelector('.cat-subs'), isOpen = btn.classList.contains('open');
  document.querySelectorAll('.cat-main').forEach(function(b){b.classList.remove('open');});
  document.querySelectorAll('.cat-subs').forEach(function(s){s.style.maxHeight='0px';s.classList.remove('open');});
  if (!isOpen) { btn.classList.add('open'); s.classList.add('open'); s.style.maxHeight = s.scrollHeight + 'px'; }
}
function sel(btn, title) {
  document.querySelectorAll('.cat-sub').forEach(function(s){s.classList.remove('on');});
  btn.classList.add('on');
  document.getElementById('secTitle').innerHTML = title + ' <span id="siteCount">-</span>';
  loadSites();
}
document.getElementById('rImage').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (file) { var r = new FileReader(); r.onload = function(ev) { var p = document.getElementById('preview'); p.src = ev.target.result; p.style.display = 'block'; document.getElementById('uploadBox').style.display = 'none'; }; r.readAsDataURL(file); }
});
async function submitSite() {
  var form = new FormData();
  form.append('name', document.getElementById('rName').value);
  form.append('category', document.getElementById('rCat').value);
  form.append('firstBonus', document.getElementById('rFirst').value);
  form.append('reloadBonus', document.getElementById('rReload').value);
  form.append('cashback', document.getElementById('rCash').value);
  form.append('allinBonus', document.getElementById('rAllin').value);
  form.append('joinBonus', document.getElementById('rJoin').value);
  form.append('rolling', document.getElementById('rRolling').value);
  form.append('eventCount', document.getElementById('rEvent').value);
  form.append('insurance', document.getElementById('rIns').checked);
  form.append('option', document.getElementById('rOpt').checked);
  var img = document.getElementById('rImage').files[0];
  if (img) form.append('image', img);
  var msg = document.getElementById('regMsg');
  try {
    var res = await fetch('/api/sites', { method: 'POST', body: form });
    var data = await res.json();
    if (data.ok) { msg.className='msg ok'; msg.textContent='등록 완료!'; msg.style.display='block'; document.getElementById('rName').value=''; document.getElementById('rFirst').value=''; document.getElementById('rReload').value=''; document.getElementById('rCash').value=''; document.getElementById('rAllin').value=''; document.getElementById('rJoin').value=''; document.getElementById('rRolling').value=''; document.getElementById('rEvent').value=''; document.getElementById('rIns').checked=false; document.getElementById('rOpt').checked=false; document.getElementById('preview').style.display='none'; document.getElementById('uploadBox').style.display='flex'; document.getElementById('rImage').value=''; }
  } catch(e) { msg.className='msg err'; msg.textContent='등록 실패'; msg.style.display='block'; }
  setTimeout(function(){msg.style.display='none';}, 3000);
}
async function loadSites() {
  try { var res = await fetch('/api/sites'); var sites = await res.json(); renderRanking(sites); } catch(e) { renderRanking([]); }
}
function renderRanking(sites) {
  var sorted = sites.slice().sort(function(a,b){return b.firstBonus - a.firstBonus;});
  var el = document.getElementById('rankList');
  var countEl = document.getElementById('siteCount');
  if (countEl) countEl.textContent = sorted.length + '개';
  if (sorted.length === 0) { el.innerHTML = '<div class="empty"><div class="empty-ic">📋</div><div class="empty-t">등록된 업체가 없습니다</div><div class="empty-d">하단 📝등록 버튼을 눌러<br>업체를 등록해주세요</div></div>'; return; }
  var html = '';
  sorted.forEach(function(s, i) {
    var imgTag = s.image ? '<img class="r1-img" src="'+s.image+'">' : '';
    var insBdg = s.insurance ? '<span class="bdg bdg-i">🛡 보험</span>' : '';
    var optBdg = s.option ? '<span class="bdg bdg-o">옵션</span>' : '';
    if (i === 0) {
      html += '<div class="r1"><div class="r1-glow"></div>'+imgTag+'<div class="r1-head"><div class="r1-num">1</div><div class="r1-name">'+s.name+'</div><div class="r1-bdg">'+insBdg+optBdg+'</div></div><div class="r1-grid"><div class="r1-cell"><div class="r1-cl">첫충</div><div class="r1-cv gd">'+s.firstBonus+'%</div><div class="r1-cs">롤링'+s.rolling+'%</div></div><div class="r1-cell"><div class="r1-cl">매충</div><div class="r1-cv">'+s.reloadBonus+'%</div></div><div class="r1-cell"><div class="r1-cl">캐시백</div><div class="r1-cv">'+s.cashback+'%</div></div></div><div class="r1-bot"><span class="r1-st">⭐⭐⭐⭐⭐</span><span class="r1-sc">-</span><span class="r1-rv">신규</span></div></div>';
    } else if (i < 3) {
      var cls = i===1?'s':'b';
      html += '<div class="rn">'+(s.image?'<img class="rn-img" src="'+s.image+'">':'<div class="rn-n '+cls+'">'+(i+1)+'</div>')+'<div class="rn-i"><div class="rn-nm'+(i>1?' d':'')+'">'+s.name+'</div><div class="rn-m"><span class="rn-st2'+(i>1?' d':' m')+'">⭐⭐⭐⭐⭐</span><span class="rn-sc2">-</span></div></div><div class="rn-r"><div class="rn-p'+(i>1?' m':' h')+'">'+s.firstBonus+'%</div><div class="rn-c">롤링'+s.rolling+'%</div></div></div>';
    } else {
      html += '<div class="rm"><div class="rm-n">'+(i+1)+'</div><div class="rm-nm">'+s.name+'</div><div class="rm-v">'+s.firstBonus+'%</div></div>';
    }
  });
  el.innerHTML = html;
}
loadSites();
</script>
</body>
</html>
