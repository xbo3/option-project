<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>OPTION — Ranking Slide</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2F0ED;--card:rgba(255,255,255,.72);--text:#1A1A1A;--text2:#777;--text3:#B0B0B0;
  --gold:#C47F17;--gold-l:#FEF5E7;--green:#1A8C5E;--green-l:#E8F8F0;
  --blue:#2660D4;--blue-l:#EBF2FE;--purple:#8B5CF6;--cyan:#06B6D4;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Sora',-apple-system,sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;justify-content:center;-webkit-font-smoothing:antialiased;}
.device{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative;overflow:hidden;}
.hdr{display:flex;align-items:center;justify-content:center;padding:6px 16px;z-index:60;background:var(--bg);}
.logo{font-weight:900;font-size:14px;letter-spacing:-.5px;
  background:linear-gradient(135deg,#C47F17,#8B5A0B);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
.main{height:calc(100vh - 30px - 56px);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:20px;}
.main::-webkit-scrollbar{display:none;}

/* Poll */
.poll{margin:6px 10px 6px;border-radius:14px;background:var(--card);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.6);padding:8px 12px;box-shadow:0 4px 16px rgba(0,0,0,.03);
  position:relative;overflow:hidden;}
.poll::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),var(--blue),var(--gold));background-size:200% 100%;animation:sh 3s ease infinite;}
@keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
.poll-row{display:flex;align-items:center;justify-content:space-between;}
.poll-tag{font-size:8px;font-weight:700;color:var(--gold);letter-spacing:1px;}
.poll-live{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:100px;
  background:var(--green-l);color:var(--green);font-size:8px;font-weight:700;}
.poll-live::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--green);animation:pd 1.5s ease infinite;}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.3}}
.poll-q{font-size:12px;font-weight:700;line-height:1.4;margin:4px 0;}
.poll-opts{display:flex;gap:5px;}
.p-opt{flex:1;padding:6px;border-radius:8px;background:rgba(0,0,0,.03);position:relative;overflow:hidden;text-align:center;}
.p-bar{position:absolute;left:0;top:0;bottom:0;border-radius:8px;}
.p-bar.a{background:rgba(38,96,212,.05);width:31%;}
.p-bar.b{background:rgba(196,127,23,.07);width:69%;}
.p-text{font-size:8px;font-weight:600;position:relative;z-index:1;}
.p-pct{font-size:11px;font-weight:800;position:relative;z-index:1;color:var(--text3);}
.p-pct.w{color:var(--gold);}

/* Sort */
.sort-bar{display:flex;gap:4px;padding:4px 10px 4px;overflow-x:auto;scrollbar-width:none;}
.sort-bar::-webkit-scrollbar{display:none;}
.sort-btn{flex-shrink:0;padding:5px 10px;border-radius:100px;font-size:10px;font-weight:600;
  color:var(--text3);background:rgba(255,255,255,.5);border:1px solid rgba(0,0,0,.04);white-space:nowrap;}
.sort-btn.on{color:#fff;background:#1A1A1A;border-color:#1A1A1A;}

.sec-t{font-size:13px;font-weight:800;letter-spacing:-.5px;padding:4px 12px 6px;}
.sec-t span{font-size:10px;font-weight:500;color:var(--text3);}

/* ========== HERO CARD (#1) — Split Layout ========== */
.hero-wrap{
  display:flex;gap:5px;padding:0 10px;margin-bottom:8px;
  position:relative;overflow:hidden;
  min-height:200px;
}

/* Left: Mobile Preview */
.hero-mobile{
  width:calc(33.33% - 4px);flex-shrink:0;border-radius:14px;overflow:hidden;
  height:200px;position:relative;
  background:#1a1a2e;
  box-shadow:0 4px 16px rgba(0,0,0,.12);
  transition:transform .45s cubic-bezier(.4,0,.2,1),opacity .45s;
  will-change:transform,opacity;
}
.hero-mobile.exit-up{
  transform:translate3d(0,-110%,0);opacity:0;
}
.hero-mobile.enter-below{
  transform:translate3d(0,110%,0);opacity:0;
  transition:none;
}
.hm-inner{position:relative;width:100%;height:100%;overflow:hidden;}
/* Mini mobile UI inside */
.hm-header{background:rgba(255,255,255,.05);padding:6px 8px;display:flex;align-items:center;justify-content:space-between;}
.hm-logo{font-size:7px;font-weight:800;color:rgba(255,255,255,.5);}
.hm-icons{display:flex;gap:4px;}
.hm-icon{width:16px;height:16px;border-radius:4px;background:rgba(255,255,255,.08);}
.hm-banner{
  margin:4px 6px;border-radius:8px;padding:8px;
  background:linear-gradient(135deg,rgba(196,127,23,.2),rgba(139,92,246,.15));
  position:relative;overflow:hidden;
}
.hm-banner-tag{font-size:5px;font-weight:700;color:#FFD700;letter-spacing:.5px;}
.hm-banner-title{font-size:9px;font-weight:800;color:#fff;margin-top:2px;line-height:1.2;}
.hm-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:6px;margin-top:2px;}
.hm-grid-item{
  aspect-ratio:1;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
}
.hm-grid-item:nth-child(1){background:linear-gradient(135deg,#FFD700,#C47F17);}
.hm-grid-item:nth-child(2){background:linear-gradient(135deg,#DC2626,#991B1B);}
.hm-grid-item:nth-child(3){background:linear-gradient(135deg,#2660D4,#1E40AF);}
.hm-grid-item:nth-child(4){background:linear-gradient(135deg,#1A8C5E,#166534);}
.hm-grid-item:nth-child(5){background:linear-gradient(135deg,#8B5CF6,#6D28D9);}
.hm-grid-item:nth-child(6){background:linear-gradient(135deg,#E97316,#C2410C);}
.hm-label{font-size:6px;color:rgba(255,255,255,.6);text-align:center;padding:2px 6px;margin-top:auto;}

/* Right: Info Banner */
.hero-info{
  flex:1;border-radius:14px;height:200px;position:relative;overflow:hidden;
  background:linear-gradient(145deg,#FFFDF8,#FFF8ED,#FFF4E0);
  border:1.5px solid rgba(196,127,23,.15);
  box-shadow:0 6px 24px rgba(196,127,23,.06);
  transition:transform .45s cubic-bezier(.4,0,.2,1),opacity .45s;
  will-change:transform,opacity;
}
.hero-info.exit-right{
  transform:translate3d(110%,0,0);opacity:0;
}
.hero-info.enter-left{
  transform:translate3d(110%,0,0);opacity:0;
  transition:none;
}
.hi-glow{position:absolute;top:-30px;right:-30px;width:80px;height:80px;
  background:radial-gradient(circle,rgba(196,127,23,.08),transparent 70%);}
.hi-inner{padding:10px;height:100%;display:flex;flex-direction:column;position:relative;z-index:2;}
.hi-tier{font-size:7px;font-weight:700;color:var(--gold);padding:2px 6px;border-radius:4px;
  background:rgba(196,127,23,.08);display:inline-block;width:fit-content;}
.hi-dia{
  font-size:56px;font-weight:900;line-height:.85;text-align:right;
  position:absolute;right:6px;top:6px;
  background:linear-gradient(180deg,#FFD54F,#C47F17,#8B6914);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;filter:drop-shadow(0 2px 3px rgba(196,127,23,.2));
  opacity:.3;
}
.hi-name{
  font-size:20px;font-weight:900;letter-spacing:-1px;line-height:1.1;margin-top:auto;
}
.hi-name.pkg-gold{color:var(--gold);}
.hi-name.pkg-blue{color:var(--blue);}
.hi-name.pkg-purple{color:var(--purple);}
.hi-name.pkg-cyan{color:var(--cyan);}
.hi-name.pkg-orange{color:#E97316;}
.hi-stats{display:flex;gap:6px;margin-top:6px;}
.hi-stat{text-align:center;}
.hi-stat .l{font-size:7px;color:var(--text3);}
.hi-stat .v{font-size:16px;font-weight:900;letter-spacing:-.5px;}
.hi-stat .v.gd{color:var(--gold);}
.hi-bot{display:flex;align-items:center;gap:4px;margin-top:6px;}
.hi-stars{font-size:8px;letter-spacing:1px;filter:saturate(1.5);}
.hi-score{font-size:13px;font-weight:900;color:var(--gold);}
.hi-meta{font-size:6px;color:var(--text3);margin-left:auto;}

/* ========== SUB CARDS ROW (2nd tier) ========== */
.sub-row{
  display:flex;gap:5px;padding:0 10px;margin-bottom:8px;
  overflow-x:auto;scrollbar-width:none;
}
.sub-row::-webkit-scrollbar{display:none;}

.sub-card{
  min-width:calc(33.33% - 4px);flex-shrink:0;
  padding:8px 6px;border-radius:12px;
  background:var(--card);backdrop-filter:blur(20px);
  border:1px solid rgba(0,0,0,.04);text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.03);
  transition:transform .45s cubic-bezier(.4,0,.2,1),opacity .45s;
  will-change:transform,opacity;
  cursor:pointer;
}
.sub-card:active{transform:scale(.96);}
.sub-card.exit-up{transform:translate3d(0,-200%,0) scale(1.1);opacity:0;}
.sub-card.shift-left{transform:translate3d(-110%,0,0);opacity:0;transition:transform .45s,opacity .45s;}

.sub-tag{font-size:6px;font-weight:700;padding:2px 5px;border-radius:4px;display:inline-block;margin-bottom:2px;letter-spacing:.3px;}
.sub-tag.blue{background:var(--blue-l);color:var(--blue);}
.sub-tag.purple{background:rgba(139,92,246,.08);color:var(--purple);}
.sub-tag.gold{background:var(--gold-l);color:var(--gold);}
.sub-tag.cyan{background:rgba(6,182,212,.08);color:var(--cyan);}
.sub-tag.orange{background:rgba(245,158,11,.08);color:#E97316;}
.sub-name{font-size:12px;font-weight:900;letter-spacing:-.3px;margin:1px 0;}
.sub-name.pkg-blue{color:var(--blue);}
.sub-name.pkg-purple{color:var(--purple);}
.sub-name.pkg-gold{color:var(--gold);}
.sub-name.pkg-cyan{color:var(--cyan);}
.sub-name.pkg-orange{color:#E97316;}
.sub-kr{font-size:8px;color:var(--text2);margin-bottom:2px;}
.sub-stats{display:flex;justify-content:center;gap:6px;}
.sub-s{text-align:center;}
.sub-s .l{font-size:6px;color:var(--text3);}
.sub-s .v{font-size:11px;font-weight:800;}

/* ========== BOTTOM ROW (5-8) ========== */
.bot-row{
  display:flex;gap:4px;padding:0 10px;margin-bottom:8px;
}
.bot-card{
  flex:1;padding:6px 4px;border-radius:10px;
  background:var(--card);border:1px solid rgba(0,0,0,.03);
  text-align:center;opacity:.65;
  transition:all .45s cubic-bezier(.4,0,.2,1);
}
.bot-card .bn{font-size:9px;font-weight:800;letter-spacing:-.2px;margin:1px 0;}
.bot-card .bk{font-size:7px;color:var(--text3);}
.bot-card .bv{font-size:10px;font-weight:800;margin-top:2px;}

/* ========== LIST ========== */
.list-section{padding:0 10px;}
.rn{border-radius:12px;padding:10px;background:var(--card);backdrop-filter:blur(20px);
  border:1px solid rgba(0,0,0,.04);display:flex;align-items:center;gap:8px;
  margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.02);}
.rn-logo{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:5px;font-weight:800;color:#fff;flex-shrink:0;line-height:1.1;text-align:center;}
.rn-i{flex:1;}
.rn-nm{font-size:11px;font-weight:700;}
.rn-m{display:flex;align-items:center;gap:3px;margin-top:1px;}
.rn-st{font-size:7px;letter-spacing:1px;}
.rn-sc{font-size:9px;font-weight:700;color:var(--text3);}
.rn-r{text-align:right;flex-shrink:0;}
.rn-p{font-size:14px;font-weight:800;}
.rn-c{font-size:7px;color:var(--text3);}

/* Live */
.live-t{font-size:11px;font-weight:800;padding:6px 10px 3px;}
.live-item{border-radius:12px;padding:10px;background:var(--card);border:1px solid rgba(0,0,0,.04);
  display:flex;align-items:center;gap:8px;margin:0 10px 6px;}
.live-badge{background:#DC2626;color:#fff;font-size:6px;font-weight:800;padding:1px 4px;border-radius:3px;margin-right:3px;}

/* Swipe hint */
.swipe-hint{text-align:center;font-size:9px;color:var(--text3);padding:4px 0;opacity:.5;
  animation:hp 2.5s ease infinite;}
@keyframes hp{0%,100%{opacity:.3}50%{opacity:.7}}

/* Bottom nav */
.bot-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;height:56px;
  display:flex;align-items:center;justify-content:space-around;
  background:rgba(242,240,237,.95);backdrop-filter:blur(20px);
  border-top:1px solid rgba(0,0,0,.06);z-index:100;}
.nav-item{font-size:18px;opacity:.3;padding:8px;}
.nav-item.on{opacity:1;}
</style>
</head>
<body>
<div class="device">
<div class="hdr"><div class="logo">OPTION</div></div>
<div class="main" id="mainArea">

<!-- Poll -->
<div class="poll">
  <div class="poll-row"><div class="poll-tag">100명에게 물어봐</div><div class="poll-live">73/100</div></div>

</div>

<div class="hero-wrap" id="heroWrap"></div>

<div class="bot-row" id="botRow"></div>

</div>

</div>
</div>

<script>
var SITES=[
  {name:'겜블시티',en:'AMBLE\nCITY',enFlat:'AMBLE CITY',first:31,reload:15,cashback:5,rating:9.4,reviews:328,users:4520,pkg:'gold',ins:true,opt:true,tag:'Diamond Tier',icons:['🎰','🃏','⚽','🎲','🎯','🏆']},
  {name:'벳콩',en:'BET\nKONG',enFlat:'BETKONG',first:31,reload:12,cashback:4,rating:9.1,reviews:245,users:3800,pkg:'blue',ins:true,opt:true,tag:'High Volume',icons:['🎰','🃏','⚽','🏀','🎲','💎']},
  {name:'크리스탈벳',en:'CRYSTAL\nBET',enFlat:'CRYSTALBET',first:27,reload:13,cashback:6,rating:8.8,reviews:190,users:2900,pkg:'purple',ins:true,opt:false,tag:'Live Cashout',icons:['🃏','🎰','♠️','♦️','🎲','💎']},
  {name:'다이아몬드',en:'DIA\nMOND',enFlat:'DIAMOND',first:25,reload:14,cashback:5,rating:9.0,reviews:210,users:3100,pkg:'cyan',ins:true,opt:true,tag:'Premium Pick',icons:['💎','🎰','⚽','🃏','🏆','🎯']},
  {name:'로얄킹',en:'ROYAL\nKING',enFlat:'ROYAL KING',first:24,reload:11,cashback:4,rating:8.5,reviews:167,users:2400,pkg:'gold',ins:true,opt:false,tag:'Fast Withdrawal',icons:['👑','🎰','🃏','⚽','🎲','💰']},
  {name:'골드러시',en:'GOLD\nRUSH',enFlat:'GOLD RUSH',first:23,reload:9,cashback:3,rating:7.8,reviews:120,users:1600,pkg:'orange',ins:false,opt:true,tag:'Rising Star',icons:['🌟','🎰','⚽','🃏','🎲','🏆']},
  {name:'에이스벳',en:'ACE\nBET',enFlat:'ACEBET',first:22,reload:12,cashback:5,rating:8.2,reviews:155,users:2100,pkg:'',ins:true,opt:false,tag:'Trusted',icons:['♠️','🎰','🃏','⚽','💎','🎲']},
  {name:'럭키스타',en:'LUCKY\nSTAR',enFlat:'LUCKY STAR',first:28,reload:10,cashback:3,rating:7.2,reviews:89,users:1200,pkg:'',ins:false,opt:false,tag:'New Entry',icons:['⭐','🎰','🃏','🎲','⚽','🏀']},
  {name:'잭팟시티',en:'JACK\nPOT',enFlat:'JACKPOT',first:29,reload:13,cashback:5,rating:8.7,reviews:200,users:3000,pkg:'gold',ins:true,opt:true,tag:'Mega Jackpot',icons:['🎰','💰','🃏','⚽','🏆','💎']},
  {name:'스핀존',en:'SPIN\nZONE',enFlat:'SPINZONE',first:26,reload:11,cashback:4,rating:8.0,reviews:130,users:1900,pkg:'purple',ins:true,opt:false,tag:'Slot Master',icons:['🎰','🌀','🃏','💎','⚽','🎲']},
];

var idx=0, animating=false;

var gradients=[
  'linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)',
  'linear-gradient(135deg,#0f172a,#1e3a5f,#1a1a2e)',
  'linear-gradient(135deg,#2d1b4e,#1a1a2e,#0f3460)',
  'linear-gradient(135deg,#1a2e1a,#162e3e,#0f3460)',
  'linear-gradient(135deg,#2e1a1a,#3e1616,#460f0f)',
];

function S(i){return SITES[(idx+i)%SITES.length];}

function renderHero(){
  var s=S(0);var pk=s.pkg?'pkg-'+s.pkg:'';
  var g=gradients[idx%gradients.length];
  var h='';
  // Mobile preview
  h+='<div class="hero-mobile" id="heroMob" style="background:'+g+'">';
  h+='<div class="hm-inner">';
  h+='<div class="hm-header"><div class="hm-logo">'+s.enFlat+'</div><div class="hm-icons"><div class="hm-icon"></div><div class="hm-icon"></div></div></div>';
  h+='<div class="hm-banner"><div class="hm-banner-tag">⚡ '+s.tag+'</div>';
  h+='<div class="hm-banner-title">'+s.name+' 특별 이벤트<br>지금 가입시 보너스!</div></div>';
  h+='<div class="hm-grid">';
  s.icons.forEach(function(ic){h+='<div class="hm-grid-item">'+ic+'</div>';});
  h+='</div>';
  h+='<div class="hm-label">▸ '+s.name+' · 라이브 카지노 · 가상경기</div>';
  h+='</div></div>';

  // Info banner
  h+='<div class="hero-info" id="heroInfo">';
  h+='<div class="hi-glow"></div><div class="hi-inner">';
  h+='<div class="hi-dia">1</div>';
  h+='<div class="hi-tier">◆ '+s.tag+'</div>';
  h+='<div class="hi-name '+pk+'">'+s.en.replace('\n','<br>')+'</div>';
  h+='<div class="hi-stats">';
  h+='<div class="hi-stat"><div class="l">캐시백</div><div class="v gd">'+s.cashback+'%</div></div>';
  h+='<div class="hi-stat"><div class="l">첫충</div><div class="v gd">'+s.first+'%</div></div>';
  h+='</div>';
  h+='<div class="hi-bot">';
  h+='<span class="hi-stars">⭐⭐⭐⭐⭐</span>';
  h+='<span class="hi-score">'+s.rating+'</span>';
  h+='<span class="hi-meta">'+s.reviews+'건·'+s.users+'명</span>';
  h+='</div></div></div>';

  document.getElementById('heroWrap').innerHTML=h;
}

function renderSub(){
  var h='';
  for(var i=1;i<=3;i++){
    var s=S(i);var pk=s.pkg?'pkg-'+s.pkg:'';var tc=s.pkg||'gold';
    h+='<div class="sub-card" data-i="'+i+'">';
    h+='<div class="sub-tag '+tc+'">'+s.tag+'</div>';
    h+='<div class="sub-name '+pk+'">'+s.enFlat+'</div>';
    h+='<div class="sub-kr">'+s.name+' ⭐'+s.rating+'</div>';
    h+='<div class="sub-stats">';
    h+='<div class="sub-s"><div class="l">첫충</div><div class="v">'+s.first+'%</div></div>';
    h+='<div class="sub-s"><div class="l">매충</div><div class="v">'+s.reload+'%</div></div>';
    h+='<div class="sub-s"><div class="l">캐시백</div><div class="v">'+s.cashback+'%</div></div>';
    h+='</div></div>';
  }
  document.getElementById('subRow').innerHTML=h;
}

function renderBot(){
  var h='';
  for(var i=4;i<=7;i++){
    var s=S(i);var pk=s.pkg?'pkg-'+s.pkg:'';
    h+='<div class="bot-card">';
    h+='<div class="bn" style="'+(s.pkg?'color:var(--'+s.pkg+')':'')+'">'+s.enFlat+'</div>';
    h+='<div class="bk">'+s.name+'</div>';
    h+='<div class="bv">'+s.first+'%</div>';
    h+='</div>';
  }
  document.getElementById('botRow').innerHTML=h;
}

function renderList(){
  var h='';
  for(var i=8;i<Math.min(10,SITES.length);i++){
    var s=S(i);
    var bg=s.pkg==='purple'?'linear-gradient(135deg,#8B5CF6,#6D28D9)':
           s.pkg==='gold'?'linear-gradient(135deg,#C47F17,#8B5A0B)':
           s.pkg==='blue'?'linear-gradient(135deg,#2660D4,#1E40AF)':
           'linear-gradient(135deg,#777,#555)';
    h+='<div class="rn">';
    h+='<div class="rn-logo" style="background:'+bg+'">'+s.enFlat.substring(0,4)+'</div>';
    h+='<div class="rn-i"><div class="rn-nm">'+s.name+'</div>';
    h+='<div class="rn-m"><span class="rn-st">⭐⭐⭐⭐⭐</span><span class="rn-sc">'+s.rating+'</span></div></div>';
    h+='<div class="rn-r"><div class="rn-p">'+s.first+'%</div><div class="rn-c">회원 '+s.users+'명</div></div></div>';
  }
  document.getElementById('listSection').innerHTML=h;

  // Live feed
  var lh='';
  for(var i=0;i<2;i++){
    var s=S(8+i);
    var bg2=s.pkg==='purple'?'linear-gradient(135deg,#8B5CF6,#6D28D9)':'linear-gradient(135deg,#C47F17,#8B5A0B)';
    lh+='<div class="live-item">';
    lh+='<div class="rn-logo" style="background:'+bg2+';width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:5px;font-weight:800;color:#fff;flex-shrink:0;">'+s.enFlat.substring(0,4)+'</div>';
    lh+='<div style="flex:1"><div style="font-size:11px;font-weight:700;">'+s.name+'</div>';
    lh+='<div style="font-size:8px;color:var(--text3);display:flex;align-items:center;gap:3px;margin-top:1px;"><span class="live-badge">LIVE</span>+패탈너수 억세한 특별 보너스</div></div>';
    lh+='<div class="rn-r"><div class="rn-p">'+s.first+'%</div><div class="rn-c">회원 '+s.users+'명</div></div></div>';
  }
  document.getElementById('liveFeed').innerHTML=lh;
}

function renderAll(){
  document.getElementById('cnt').textContent=SITES.length+'개';
  renderHero();renderSub();renderBot();renderList();
}

function cycleNext(){
  if(animating)return;
  animating=true;

  // 1. Hero mobile exits UP
  var mob=document.getElementById('heroMob');
  var info=document.getElementById('heroInfo');
  if(mob) mob.classList.add('exit-up');
  // 2. Hero info exits RIGHT
  if(info) info.classList.add('exit-right');

  // 3. First sub card highlight
  var firstSub=document.querySelector('.sub-card[data-i="1"]');
  if(firstSub){
    firstSub.style.transition='all .45s cubic-bezier(.4,0,.2,1)';
    firstSub.style.transform='translate3d(0,-60px,0) scale(1.05)';
    firstSub.style.opacity='.7';
    firstSub.style.zIndex='20';
  }

  setTimeout(function(){
    idx=(idx+1)%SITES.length;
    renderAll();

    // Entrance animation for new hero
    var newMob=document.getElementById('heroMob');
    var newInfo=document.getElementById('heroInfo');
    if(newMob){
      newMob.classList.add('enter-below');
      requestAnimationFrame(function(){requestAnimationFrame(function(){
        newMob.classList.remove('enter-below');
      });});
    }
    if(newInfo){
      newInfo.classList.add('enter-left');
      requestAnimationFrame(function(){requestAnimationFrame(function(){
        newInfo.classList.remove('enter-left');
      });});
    }

    animating=false;
  },460);
}

function cyclePrev(){
  if(animating)return;
  animating=true;
  var mob=document.getElementById('heroMob');
  var info=document.getElementById('heroInfo');
  if(mob){mob.style.transition='all .45s cubic-bezier(.4,0,.2,1)';mob.style.transform='translate3d(0,110%,0)';mob.style.opacity='0';}
  if(info){info.style.transition='all .45s cubic-bezier(.4,0,.2,1)';info.style.transform='translate3d(-110%,0,0)';info.style.opacity='0';}
  setTimeout(function(){
    idx=(idx-1+SITES.length)%SITES.length;
    renderAll();
    animating=false;
  },460);
}

// Swipe
(function(){
  var area=document.getElementById('mainArea');
  var sx=0,sy=0,st=0;
  area.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();},{passive:true});
  area.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy,dt=Date.now()-st;
    if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.2&&dt<500){
      if(dx<0)cycleNext();else cyclePrev();
    }
  },{passive:true});
  var md=false;
  area.addEventListener('mousedown',function(e){md=true;sx=e.clientX;st=Date.now();});
  area.addEventListener('mouseup',function(e){if(!md)return;md=false;var dx=e.clientX-sx;if(Math.abs(dx)>50&&Date.now()-st<500){if(dx<0)cycleNext();else cyclePrev();}});
  document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft')cyclePrev();if(e.key==='ArrowRight')cycleNext();});
})();

// Auto
var at=setInterval(function(){if(!document.hidden)cycleNext();},5000);
document.addEventListener('touchstart',function(){clearInterval(at);},{once:true});

renderAll();
</script>
</body>
</html>
