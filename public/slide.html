<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>OPTION — Gear Drums</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2F0ED;--card:rgba(255,255,255,.72);--text:#1A1A1A;--text2:#777;--text3:#B0B0B0;
  --gold:#C47F17;--gold-l:#FEF5E7;--green:#1A8C5E;--green-l:#E8F8F0;
  --blue:#2660D4;--blue-l:#EBF2FE;--purple:#8B5CF6;--cyan:#06B6D4;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Sora',-apple-system,sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;justify-content:center;-webkit-font-smoothing:antialiased;}
.device{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative;overflow:hidden;}
.hdr{display:flex;align-items:center;justify-content:center;padding:6px 16px;z-index:60;background:var(--bg);}
.logo{font-weight:900;font-size:14px;letter-spacing:-.5px;
  background:linear-gradient(135deg,#C47F17,#8B5A0B);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
.main{height:calc(100vh - 30px - 56px);overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;padding-bottom:20px;}
.main::-webkit-scrollbar{display:none;}

.poll{margin:4px 4px;border-radius:12px;background:var(--card);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.6);padding:8px 12px;box-shadow:0 4px 16px rgba(0,0,0,.03);
  position:relative;overflow:hidden;}
.poll::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),var(--blue),var(--gold));background-size:200% 100%;animation:sh 3s ease infinite;}
@keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
.poll-row{display:flex;align-items:center;justify-content:space-between;}
.poll-tag{font-size:8px;font-weight:700;color:var(--gold);letter-spacing:1px;}
.poll-live{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:100px;
  background:var(--green-l);color:var(--green);font-size:8px;font-weight:700;}
.poll-live::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--green);animation:pd 1.5s ease infinite;}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.3}}
.poll-q{font-size:12px;font-weight:700;line-height:1.4;margin:4px 0;}
.poll-opts{display:flex;gap:5px;}
.p-opt{flex:1;padding:6px;border-radius:8px;background:rgba(0,0,0,.03);position:relative;overflow:hidden;text-align:center;}
.p-bar{position:absolute;left:0;top:0;bottom:0;border-radius:8px;}
.p-bar.a{background:rgba(38,96,212,.05);width:31%;}.p-bar.b{background:rgba(196,127,23,.07);width:69%;}
.p-text{font-size:8px;font-weight:600;position:relative;z-index:1;}
.p-pct{font-size:11px;font-weight:800;position:relative;z-index:1;color:var(--text3);}.p-pct.w{color:var(--gold);}
.sort-bar{display:flex;gap:4px;padding:4px 4px;overflow-x:auto;scrollbar-width:none;}
.sort-bar::-webkit-scrollbar{display:none;}
.sort-btn{flex-shrink:0;padding:5px 10px;border-radius:100px;font-size:10px;font-weight:600;
  color:var(--text3);background:rgba(255,255,255,.5);border:1px solid rgba(0,0,0,.04);white-space:nowrap;}
.sort-btn.on{color:#fff;background:#1A1A1A;border-color:#1A1A1A;}
.sec-t{font-size:13px;font-weight:800;letter-spacing:-.5px;padding:2px 6px 4px;}
.sec-t span{font-size:10px;font-weight:500;color:var(--text3);}

.row-hero{display:flex;gap:3px;padding:0 4px;margin-bottom:4px;}
.row-sub{display:flex;gap:3px;padding:0 4px;margin-bottom:4px;}
.row-bot{display:flex;gap:3px;padding:0 4px;margin-bottom:4px;}

/* ========== DRUM ========== */
.drum{overflow:hidden;position:relative;perspective:800px;}
.drum .rotor{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
}
.drum .face{
  position:absolute;top:0;left:0;width:100%;height:100%;
  backface-visibility:hidden;overflow:hidden;
}

/* sizes */
.d-mob{width:calc(33.33% - 2px);flex-shrink:0;height:210px;border-radius:12px;background:#1a1a2e;box-shadow:0 4px 16px rgba(0,0,0,.12);}
.d-inf{flex:1;height:210px;border-radius:12px;background:linear-gradient(145deg,#FFFDF8,#FFF8ED,#FFF4E0);
  border:1.5px solid rgba(196,127,23,.15);box-shadow:0 6px 24px rgba(196,127,23,.06);}
.d-sub{flex:1;min-width:0;height:155px;border-radius:10px;background:var(--card);
  border:1px solid rgba(0,0,0,.04);box-shadow:0 2px 8px rgba(0,0,0,.03);}
.d-bot{flex:1;min-width:0;height:110px;border-radius:10px;background:var(--card);border:1px solid rgba(0,0,0,.03);}

/* ========== CONTENT ========== */
.mob-in{height:100%;padding:6px;color:#fff;display:flex;flex-direction:column;overflow:hidden;}
.mob-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.mob-lo{font-size:6px;font-weight:800;opacity:.5;}
.mob-bn{border-radius:8px;padding:5px;margin-bottom:3px;background:linear-gradient(135deg,rgba(196,127,23,.2),rgba(139,92,246,.15));}
.mob-bt{font-size:5px;font-weight:700;color:#FFD700;letter-spacing:.5px;}
.mob-btt{font-size:7px;font-weight:800;margin-top:1px;line-height:1.2;}
.mob-gr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin-top:auto;}
.mob-gi{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.mob-lb{font-size:5px;opacity:.4;text-align:center;padding:2px;}

.inf-in{padding:10px;height:100%;display:flex;flex-direction:column;position:relative;
  background:linear-gradient(145deg,#FFFDF8,#FFF8ED,#FFF4E0);}
.inf-glow{position:absolute;top:-30px;right:-30px;width:80px;height:80px;
  background:radial-gradient(circle,rgba(196,127,23,.08),transparent 70%);}
.inf-dia{position:absolute;right:6px;top:4px;font-size:50px;font-weight:900;line-height:.85;
  background:linear-gradient(180deg,#FFD54F,#C47F17,#8B6914);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:.25;}
.inf-tier{font-size:7px;font-weight:700;color:var(--gold);padding:2px 6px;border-radius:4px;
  background:rgba(196,127,23,.08);display:inline-block;width:fit-content;position:relative;z-index:2;}
.inf-name{font-size:20px;font-weight:900;letter-spacing:-1px;line-height:1.1;margin-top:auto;position:relative;z-index:2;}
.inf-sts{display:flex;gap:6px;margin-top:5px;position:relative;z-index:2;}
.inf-st{text-align:center;}.inf-st .l{font-size:7px;color:var(--text3);}
.inf-st .v{font-size:15px;font-weight:900;letter-spacing:-.5px;}.inf-st .v.gd{color:var(--gold);}
.inf-bot{display:flex;align-items:center;gap:4px;margin-top:5px;position:relative;z-index:2;}
.inf-stars{font-size:8px;letter-spacing:1px;filter:saturate(1.5);}
.inf-score{font-size:12px;font-weight:900;color:var(--gold);}
.inf-meta{font-size:6px;color:var(--text3);margin-left:auto;}

.sub-in{height:100%;display:flex;flex-direction:column;overflow:hidden;background:var(--card);}
.sub-img{height:65px;position:relative;overflow:hidden;}
.sub-img .sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;padding:4px;width:100%;height:100%;}
.sub-img .sgi{border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;}
.sub-img .sov{position:absolute;bottom:0;left:0;right:0;padding:2px 5px;
  background:linear-gradient(transparent,rgba(0,0,0,.7));display:flex;justify-content:center;}
.sub-img .sov span{font-size:7px;font-weight:700;color:#fff;}
.sub-body{padding:4px 4px;display:flex;flex-direction:column;align-items:center;text-align:center;flex:1;}
.sub-tag{font-size:6px;font-weight:700;padding:2px 5px;border-radius:4px;display:inline-block;margin-bottom:1px;}
.sub-tag.blue{background:var(--blue-l);color:var(--blue);}
.sub-tag.purple{background:rgba(139,92,246,.08);color:var(--purple);}
.sub-tag.gold{background:var(--gold-l);color:var(--gold);}
.sub-tag.cyan{background:rgba(6,182,212,.08);color:var(--cyan);}
.sub-tag.orange{background:rgba(245,158,11,.08);color:#E97316;}
.sub-nm{font-size:12px;font-weight:900;letter-spacing:-.3px;}
.sub-kr{font-size:7px;color:var(--text2);margin-bottom:1px;}
.sub-sts{display:flex;gap:6px;margin-top:auto;}
.sub-sts .l{font-size:5px;color:var(--text3);}.sub-sts .v{font-size:11px;font-weight:800;}

.bot-in{height:100%;display:flex;flex-direction:column;overflow:hidden;background:var(--card);}
.bot-img{height:55px;position:relative;overflow:hidden;}
.bot-img .bg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;padding:3px;width:100%;height:100%;}
.bot-img .bgi{border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;}
.bot-body{padding:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;flex:1;}
.bot-nm{font-size:9px;font-weight:800;}.bot-kr{font-size:6px;color:var(--text3);}.bot-v{font-size:10px;font-weight:800;margin-top:1px;}
.c-gold{color:var(--gold);}.c-blue{color:var(--blue);}.c-purple{color:var(--purple);}.c-cyan{color:var(--cyan);}.c-orange{color:#E97316;}

.list-sec{padding:0 4px;margin-top:4px;}
.rn{border-radius:12px;padding:10px;background:var(--card);border:1px solid rgba(0,0,0,.04);
  display:flex;align-items:center;gap:8px;margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.02);}
.rn-logo{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:5px;font-weight:800;color:#fff;flex-shrink:0;text-align:center;line-height:1.1;}
.rn-i{flex:1;}.rn-nm{font-size:11px;font-weight:700;}
.rn-m{display:flex;align-items:center;gap:3px;margin-top:1px;}
.rn-st{font-size:7px;letter-spacing:1px;}.rn-sc{font-size:9px;font-weight:700;color:var(--text3);}
.rn-r{text-align:right;flex-shrink:0;}.rn-p{font-size:14px;font-weight:800;}.rn-c{font-size:7px;color:var(--text3);}
.live-t{font-size:11px;font-weight:800;padding:6px 6px 3px;}
.live-item{border-radius:12px;padding:10px;background:var(--card);border:1px solid rgba(0,0,0,.04);
  display:flex;align-items:center;gap:8px;margin:0 4px 6px;}
.live-badge{background:#DC2626;color:#fff;font-size:6px;font-weight:800;padding:1px 4px;border-radius:3px;margin-right:2px;}
.swipe-hint{text-align:center;font-size:9px;color:var(--text3);padding:4px 0;opacity:.5;animation:hp 2.5s ease infinite;}
@keyframes hp{0%,100%{opacity:.3}50%{opacity:.7}}
.bot-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:56px;
  display:flex;align-items:center;justify-content:space-around;background:rgba(242,240,237,.95);
  backdrop-filter:blur(20px);border-top:1px solid rgba(0,0,0,.06);z-index:100;}
.nav-item{font-size:18px;opacity:.3;padding:8px;}.nav-item.on{opacity:1;}
</style>
</head>
<body>
<div class="device">
<div class="hdr"><div class="logo">OPTION</div></div>
<div class="main" id="mainArea">
<div class="poll">
  <div class="poll-row"><div class="poll-tag">100명에게 물어봐</div><div class="poll-live">73/100</div></div>
  <div class="poll-q">친구가 슬롯 잘하면 여자도 꼬실 수 있다는데? 🤔</div>
  <div class="poll-opts">
    <div class="p-opt"><div class="p-bar a"></div><div class="p-text">친구 말이 맞다</div><div class="p-pct">31%</div></div>
    <div class="p-opt"><div class="p-bar b"></div><div class="p-text">사람색기 아니네</div><div class="p-pct w">69%</div></div>
  </div>
</div>
<div class="sort-bar">
  <div class="sort-btn on">첫충 높은순</div><div class="sort-btn">매충 높은순</div>
  <div class="sort-btn">캐시백 높은순</div><div class="sort-btn">올인 높은순</div>
  <div class="sort-btn">가입 높은순</div><div class="sort-btn">이벤트</div>
</div>
<div class="sec-t">최고 조건 추천 <span id="cnt">10개</span></div>

<div class="row-hero" id="rowH"></div>
<div class="row-sub" id="rowS"></div>
<div class="row-bot" id="rowB"></div>

<div class="swipe-hint">↑ 올리면 다음 · ↓ 내리면 이전</div>
<div class="list-sec" id="listSec"></div>
<div class="live-t">라이브 조건 피드</div>
<div id="liveFeed"></div>
</div>
<div class="bot-nav">
  <div class="nav-item">☰</div><div class="nav-item on">📊</div>
  <div class="nav-item">✏️</div><div class="nav-item">◇</div><div class="nav-item">👤</div>
</div>
</div>

<script>
var D=[
  {n:'겜블시티',ef:'AMBLE CITY',en:'AMBLE\nCITY',f:31,r:15,c:5,rt:9.4,rv:328,u:4520,p:'gold',tag:'Diamond Tier',ic:['🎰','🃏','⚽','🎲','🎯','🏆']},
  {n:'벳콩',ef:'BETKONG',en:'BET\nKONG',f:31,r:12,c:4,rt:9.1,rv:245,u:3800,p:'blue',tag:'High Volume',ic:['🎰','🃏','⚽','🏀','🎲','💎']},
  {n:'크리스탈벳',ef:'CRYSTALBET',en:'CRYSTAL\nBET',f:27,r:13,c:6,rt:8.8,rv:190,u:2900,p:'purple',tag:'Live Cashout',ic:['🃏','🎰','♠️','♦️','🎲','💎']},
  {n:'다이아몬드',ef:'DIAMOND',en:'DIA\nMOND',f:25,r:14,c:5,rt:9.0,rv:210,u:3100,p:'cyan',tag:'Premium Pick',ic:['💎','🎰','⚽','🃏','🏆','🎯']},
  {n:'로얄킹',ef:'ROYAL KING',en:'ROYAL\nKING',f:24,r:11,c:4,rt:8.5,rv:167,u:2400,p:'gold',tag:'Fast Withdrawal',ic:['👑','🎰','🃏','⚽','🎲','💰']},
  {n:'골드러시',ef:'GOLD RUSH',en:'GOLD\nRUSH',f:23,r:9,c:3,rt:7.8,rv:120,u:1600,p:'orange',tag:'Rising Star',ic:['🌟','🎰','⚽','🃏','🎲','🏆']},
  {n:'에이스벳',ef:'ACEBET',en:'ACE\nBET',f:22,r:12,c:5,rt:8.2,rv:155,u:2100,p:'',tag:'Trusted',ic:['♠️','🎰','🃏','⚽','💎','🎲']},
  {n:'럭키스타',ef:'LUCKY STAR',en:'LUCKY\nSTAR',f:28,r:10,c:3,rt:7.2,rv:89,u:1200,p:'',tag:'New Entry',ic:['⭐','🎰','🃏','🎲','⚽','🏀']},
  {n:'잭팟시티',ef:'JACKPOT',en:'JACK\nPOT',f:29,r:13,c:5,rt:8.7,rv:200,u:3000,p:'gold',tag:'Mega Jackpot',ic:['🎰','💰','🃏','⚽','🏆','💎']},
  {n:'스핀존',ef:'SPINZONE',en:'SPIN\nZONE',f:26,r:11,c:4,rt:8.0,rv:130,u:1900,p:'purple',tag:'Slot Master',ic:['🎰','🌀','🃏','💎','⚽','🎲']},
];
var N=D.length,ci=0,busy=false;
var bgs=['linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)','linear-gradient(135deg,#0f172a,#1e3a5f,#1a1a2e)',
  'linear-gradient(135deg,#2d1b4e,#1a1a2e,#0f3460)','linear-gradient(135deg,#1a2e1a,#162e3e,#0f3460)',
  'linear-gradient(135deg,#2e1a1a,#3e1616,#460f2f)'];
var gC=[['#FFD700','#C47F17'],['#DC2626','#991B1B'],['#2660D4','#1E40AF'],['#1A8C5E','#166534'],['#8B5CF6','#6D28D9'],['#E97316','#C2410C']];

function S(off,b){return D[((b!=null?b:ci)+off)%N];}
function cc(p){return p?'c-'+p:'';}
function $(id){return document.getElementById(id);}

/*
 GEAR DIRECTION MAP — each opposite to its reference:
 slot 0 (1위mob): base direction
 slot 1 (1위inf): opposite of 0
 slot 2 (2위):    opposite of 1 → same as 0
 slot 3 (3위):    opposite of 2 → same as 1
 slot 4 (4위):    opposite of 3 → same as 0
 slot 5 (5위):    opposite of 2 → same as 1
 slot 6 (6위):    opposite of 5 → same as 0
 slot 7 (7위):    opposite of 6 → same as 1
 slot 8 (8위):    opposite of 7 → same as 0
*/
// 1 = same as base, -1 = opposite
var gearDir = [1, -1, 1, -1, 1, -1, 1, -1, 1];

// Heights & delays
var hts = [210,210, 155,155,155, 110,110,110,110];
var delays = [0, 80, 180, 300, 430, 260, 400, 540, 680];

// Drum types & CSS classes
var drumTypes = ['d-mob','d-inf','d-sub','d-sub','d-sub','d-bot','d-bot','d-bot','d-bot'];

// Build DOM
function buildDrums(){
  var rows = [
    {el:$('rowH'), slots:[0,1]},
    {el:$('rowS'), slots:[2,3,4]},
    {el:$('rowB'), slots:[5,6,7,8]}
  ];
  rows.forEach(function(row){
    var html='';
    row.slots.forEach(function(i){
      var tz = hts[i]/2;
      html+='<div class="drum '+drumTypes[i]+'" id="d'+i+'">'+
        '<div class="rotor" id="r'+i+'">'+
        '<div class="face" id="ff'+i+'" style="transform:rotateX(0deg) translateZ('+tz+'px)"></div>'+
        '<div class="face" id="fb'+i+'" style="transform:rotateX(180deg) translateZ('+tz+'px)"></div>'+
        '</div></div>';
    });
    row.el.innerHTML=html;
  });
}

// HTML builders
function mobH(s,i){
  var bg=bgs[i%bgs.length];
  return '<div class="mob-in" style="background:'+bg+'"><div class="mob-hd"><div class="mob-lo">'+s.ef+'</div></div>'+
    '<div class="mob-bn"><div class="mob-bt">⚡ '+s.tag+'</div><div class="mob-btt">'+s.n+' 특별 이벤트</div></div>'+
    '<div class="mob-gr">'+s.ic.map(function(ic,j){return '<div class="mob-gi" style="background:linear-gradient(135deg,'+gC[j][0]+','+gC[j][1]+')">'+ic+'</div>';}).join('')+'</div>'+
    '<div class="mob-lb">'+s.n+' · 라이브</div></div>';
}
function infH(s){
  return '<div class="inf-in"><div class="inf-glow"></div><div class="inf-dia">1</div>'+
    '<div class="inf-tier">◆ '+s.tag+'</div><div class="inf-name '+cc(s.p)+'">'+s.en.replace('\n','<br>')+'</div>'+
    '<div class="inf-sts"><div class="inf-st"><div class="l">캐시백</div><div class="v gd">'+s.c+'%</div></div>'+
    '<div class="inf-st"><div class="l">첫충</div><div class="v gd">'+s.f+'%</div></div></div>'+
    '<div class="inf-bot"><span class="inf-stars">⭐⭐⭐⭐⭐</span><span class="inf-score">'+s.rt+'</span>'+
    '<span class="inf-meta">'+s.rv+'건·'+s.u+'명</span></div></div>';
}
function subH(s,i){
  var tc=s.p||'gold';var bg=bgs[i%bgs.length];
  return '<div class="sub-in"><div class="sub-img" style="background:'+bg+'">'+
    '<div class="sg">'+s.ic.slice(0,6).map(function(ic,j){return '<div class="sgi" style="background:linear-gradient(135deg,'+gC[j][0]+','+gC[j][1]+')">'+ic+'</div>';}).join('')+'</div>'+
    '<div class="sov"><span>'+s.ef+'</span></div></div>'+
    '<div class="sub-body"><div class="sub-tag '+tc+'">'+s.tag+'</div><div class="sub-nm '+cc(s.p)+'">'+s.ef+'</div>'+
    '<div class="sub-kr">'+s.n+' ⭐'+s.rt+'</div>'+
    '<div class="sub-sts"><div><div class="l">첫충</div><div class="v">'+s.f+'%</div></div>'+
    '<div><div class="l">매충</div><div class="v">'+s.r+'%</div></div>'+
    '<div><div class="l">캐시백</div><div class="v">'+s.c+'%</div></div></div></div></div>';
}
function botH(s,i){
  var bg=bgs[i%bgs.length];
  return '<div class="bot-in"><div class="bot-img" style="background:'+bg+'">'+
    '<div class="bg">'+s.ic.slice(0,6).map(function(ic,j){return '<div class="bgi" style="background:linear-gradient(135deg,'+gC[j][0]+','+gC[j][1]+')">'+ic+'</div>';}).join('')+'</div></div>'+
    '<div class="bot-body"><div class="bot-nm '+cc(s.p)+'">'+s.ef+'</div><div class="bot-kr">'+s.n+'</div>'+
    '<div class="bot-v">'+s.f+'%</div></div></div>';
}
function slotHTML(i,b){
  if(i===0) return mobH(S(0,b),b);
  if(i===1) return infH(S(0,b));
  if(i<=4) return subH(S(i-1,b),b+i);
  return botH(S(i-1,b),b+i);
}

function fillFronts(b){
  for(var i=0;i<=8;i++) $('ff'+i).innerHTML=slotHTML(i,b);
}
function fillList(b){
  var lh='';
  for(var i=8;i<N;i++){
    var s=S(i,b),bg=s.p==='purple'?'#8B5CF6':s.p==='gold'?'#C47F17':s.p==='blue'?'#2660D4':s.p==='orange'?'#E97316':'#777';
    lh+='<div class="rn"><div class="rn-logo" style="background:'+bg+'">'+s.ef.substring(0,4)+'</div>'+
      '<div class="rn-i"><div class="rn-nm">'+s.n+'</div><div class="rn-m"><span class="rn-st">⭐⭐⭐⭐⭐</span><span class="rn-sc">'+s.rt+'</span></div></div>'+
      '<div class="rn-r"><div class="rn-p">'+s.f+'%</div><div class="rn-c">회원 '+s.u+'명</div></div></div>';
  }
  $('listSec').innerHTML=lh;
  var fh='';
  for(var i=0;i<2;i++){
    var s=S(i+1,b),bg2=s.p==='purple'?'#8B5CF6':s.p==='blue'?'#2660D4':s.p==='gold'?'#C47F17':'#777';
    fh+='<div class="live-item"><div class="rn-logo" style="background:'+bg2+';width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:5px;font-weight:800;color:#fff;flex-shrink:0">'+s.ef.substring(0,4)+'</div>'+
      '<div style="flex:1"><div style="font-size:11px;font-weight:700">'+s.n+'</div>'+
      '<div style="font-size:8px;color:var(--text3);display:flex;align-items:center;gap:3px;margin-top:1px"><span class="live-badge">LIVE</span>특별 보너스</div></div>'+
      '<div class="rn-r"><div class="rn-p">'+s.f+'%</div><div class="rn-c">회원 '+s.u+'명</div></div></div>';
  }
  $('liveFeed').innerHTML=fh;
}

// ========== INTERLOCKING GEAR CASCADE ==========
function gearCascade(dir){
  if(busy) return;
  busy=true;

  var nextCi = dir==='next' ? (ci+1)%N : (ci-1+N)%N;
  // base rotation: swipe up → drum flips "forward" = rotateX(-180)
  var baseAngle = dir==='next' ? -180 : 180;

  // Fill back faces with next content
  for(var i=0;i<=8;i++) $('fb'+i).innerHTML=slotHTML(i,nextCi);

  // Animate each drum with gear direction + cascade delay
  var maxEndTime = 0;
  for(var i=0;i<=8;i++){
    (function(idx){
      var angle = baseAngle * gearDir[idx]; // flip direction per gear map
      var delay = delays[idx];
      var force = 1.0 - idx*0.04;
      var duration = 650 + idx*50;
      var ease = 'cubic-bezier(.25,.1,.25,1)';

      var endTime = delay + duration;
      if(endTime > maxEndTime) maxEndTime = endTime;

      setTimeout(function(){
        var rotor = $('r'+idx);
        rotor.style.transition = 'transform '+duration+'ms '+ease;
        rotor.style.transform = 'rotateX('+angle+'deg)';
      }, delay);
    })(i);
  }

  // After all done, reset
  setTimeout(function(){
    ci = nextCi;
    for(var i=0;i<=8;i++){
      var rotor = $('r'+i);
      rotor.style.transition = 'none';
      rotor.style.transform = '';
      $('ff'+i).innerHTML = $('fb'+i).innerHTML;
      $('fb'+i).innerHTML = '';
    }
    fillList(ci);
    busy=false;
  }, maxEndTime + 60);
}

// ========== TOUCH ==========
(function(){
  var a=$('mainArea'),sx=0,sy=0,st=0;
  a.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();},{passive:true});
  a.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy,dt=Date.now()-st;
    if(dt>600) return;
    if(Math.abs(dy)>40 && Math.abs(dy)>Math.abs(dx)*0.7){
      if(dy<0) gearCascade('next'); else gearCascade('prev');
    } else if(Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy)*1.0){
      if(dx<0) gearCascade('next'); else gearCascade('prev');
    }
  },{passive:true});
  var md=false;
  a.addEventListener('mousedown',function(e){md=true;sx=e.clientX;sy=e.clientY;st=Date.now();});
  a.addEventListener('mouseup',function(e){
    if(!md)return;md=false;var dx=e.clientX-sx,dy=e.clientY-sy,dt=Date.now()-st;
    if(dt>600)return;
    if(Math.abs(dy)>40&&Math.abs(dy)>Math.abs(dx)*0.7){if(dy<0)gearCascade('next');else gearCascade('prev');}
    else if(Math.abs(dx)>40){if(dx<0)gearCascade('next');else gearCascade('prev');}
  });
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowUp'||e.key==='ArrowRight')gearCascade('next');
    if(e.key==='ArrowDown'||e.key==='ArrowLeft')gearCascade('prev');
  });
})();

var at=setInterval(function(){if(!document.hidden)gearCascade('next');},6000);
document.addEventListener('touchstart',function(){clearInterval(at);},{once:true});

buildDrums();
fillFronts(ci);
fillList(ci);
</script>
